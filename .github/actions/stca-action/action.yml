name: STCA Pipeline
description: Run STCA static analysis on PRs and annotate code with findings
inputs:
  path:
    description: Path to scan
    required: false
    default: '.'
  strictness:
    description: Strictness level (1-9)
    required: false
    default: '5'
  block-on:
    description: 'Comma-separated severities to block on'
    required: false
    default: 'critical'
  full-scan:
    description: Run full repo scan instead of diff-only
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - name: Install STCA
      shell: bash
      run: pip install --user .
      # Install from the repo's local copy (the action runs from repo root).
      # To install from PyPI instead: pip install --user stca-pipeline
      # To install from GitHub: pip install --user git+https://github.com/YOUR_ORG/stca-pipeline.git
    - name: Run STCA
      shell: bash
      run: |
        stca check --sarif --output stca.sarif \
          --strictness ${{ inputs.strictness }} \
          ${{ inputs.full-scan == 'true' && '--full' || '' }} \
          ${{ inputs.path }}
        python3 -c "
        import json
        with open('stca.sarif') as f:
            data = json.load(f)
        block_sevs = '${{ inputs.block-on }}'.split(',')
        blocking = 0
        for run in data.get('runs', []):
            for result in run.get('results', []):
                level = result.get('level', 'note').lower()
                if level in block_sevs:
                    blocking += 1
        if blocking > 0:
            print(f'STCA: {blocking} blocking findings')
            exit(1)
        print('STCA: no blocking findings')
        "
    - name: Upload SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: stca.sarif
