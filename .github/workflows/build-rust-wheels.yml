name: Build Rust Core Wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build wheel for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — use Docker (manylinux)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-docker: true
          # Linux aarch64 — use Docker (manylinux cross)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-docker: true
          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            use-docker: false
          # macOS Apple Silicon
          - os: macos-14
            target: aarch64-apple-darwin
            use-docker: false
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-docker: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin

      # ── Docker build (Linux) ──
      - name: Build wheel (Docker — Linux)
        if: matrix.use-docker == true
        working-directory: rust-core
        run: |
          maturin build --release --target ${{ matrix.target }} --out dist --docker
        env:
          PYO3_PYTHON: python

      # ── Native build (macOS/Windows) ──
      - name: Build wheel (native — macOS/Windows)
        if: matrix.use-docker != true
        working-directory: rust-core
        run: |
          maturin build --release --target ${{ matrix.target }} --out dist -i python
        env:
          PYO3_PYTHON: python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: rust-core/dist/*.whl
          if-no-files-found: warn

  publish:
    name: Publish wheels to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List collected wheels
        run: ls -la dist/

      - name: Publish to PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$PYPI_TOKEN" ]; then
            echo "PYPI_TOKEN not set — skipping publish"
            exit 0
          fi
          pip install twine
          twine upload dist/*.whl --username __token__ --password "$PYPI_TOKEN" || true
        continue-on-error: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true