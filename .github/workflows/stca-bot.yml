name: STCA PR Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  stca-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install STCA
        run: pip install --user .
        # Install from the repo's local copy (checked out by actions/checkout above).
        # To install from PyPI: pip install --user stca-pipeline
        # To install from GitHub: pip install --user git+https://github.com/YOUR_ORG/stca-pipeline.git

      - name: Run STCA PR Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          stca bot \
            --repo . \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --event ${{ github.event_path }}

      - name: Upload SARIF (for Code Scanning tab)
        if: always()
        run: |
          stca check --sarif --output stca.sarif --base origin/${{ github.base_ref }}
        continue-on-error: true

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: stca.sarif
        continue-on-error: true
