name: Build JetBrains Plugin

on:
  push:
    branches: [main, master]
    paths:
      - 'editor/intellij-stca/**'
  pull_request:
    paths:
      - 'editor/intellij-stca/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.5'

      - name: Build plugin
        working-directory: editor/intellij-stca
        run: gradle buildPlugin --no-daemon

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: stca-intellij-plugin
          path: editor/intellij-stca/build/distributions/*.zip
          retention-days: 30

      - name: Verify plugin structure
        working-directory: editor/intellij-stca
        run: |
          echo "Plugin built successfully."
          ls -la build/distributions/
          echo "=== plugin.xml content ==="
          cat src/main/resources/META-INF/plugin.xml | head -20
