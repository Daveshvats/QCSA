# LoomScan Elixir Security Rules — 30 rules
rules:
  - id: elixir-code-eval
    pattern: "\\bCode\\.eval_string\\s*\\("
    severity: critical
    message: "Code.eval_string — RCE on user input"
    metadata: {cwe: "CWE-94"}
  - id: elixir-code-string-user
    pattern: "\\bCode\\.eval_string\\s*\\([^)]*(?:params|conn|request)"
    severity: critical
    message: "Code.eval_string with user input — RCE"
    metadata: {cwe: "CWE-94"}
  - id: elixir-system-cmd
    pattern: "\\bSystem\\.cmd\\s*\\("
    severity: high
    message: "System.cmd — verify no shell injection"
    metadata: {cwe: "CWE-78"}
  - id: elixir-system-cmd-user
    pattern: "\\bSystem\\.cmd\\s*\\([^,]+,\\s*(?:params|conn)"
    severity: critical
    message: "System.cmd with user input — RCE"
    metadata: {cwe: "CWE-78"}
  - id: elixir-port-command
    pattern: "\\bPort\\.command\\s*\\("
    severity: high
    message: "Port.command — verify no user input"
    metadata: {cwe: "CWE-78"}
  - id: elixir-erlang-system
    pattern: ":os\\.cmd\\s*\\("
    severity: high
    message: ":os.cmd — Erlang system call, injection risk"
    metadata: {cwe: "CWE-78"}
  - id: elixir-erlang-system-user
    pattern: ":os\\.cmd\\s*\\([^)]*(?:params|conn)"
    severity: critical
    message: ":os.cmd with user input — RCE"
    metadata: {cwe: "CWE-78"}
  - id: elixir-hardcoded-secret
    pattern: "\\b(?:password|secret|api[_-]?key|auth[_-]?token)\\s*[:=]\\s*[\\\"'][^\\\"']{8,}[\\\"']"
    severity: high
    message: "Hardcoded secret"
    metadata: {cwe: "CWE-798"}
  - id: elixir-md5
    pattern: ":crypto\\.hash\\s*\\(\\s*:md5\\b|:md5\\b"
    severity: high
    message: "MD5 broken — use :sha256"
    metadata: {cwe: "CWE-327"}
  - id: elixir-sha1
    pattern: ":crypto\\.hash\\s*\\(\\s*:sha\\b|:sha\\b"
    severity: high
    message: "SHA1 broken — use :sha256"
    metadata: {cwe: "CWE-327"}
  - id: elixir-des
    pattern: ":crypto\\.hash\\s*\\(\\s*:des\\b|:des\\b"
    severity: critical
    message: "DES broken — 56-bit key"
    metadata: {cwe: "CWE-327"}
  - id: elixir-rc4
    pattern: ":crypto\\.stream_init\\s*\\(\\s*:rc4\\b"
    severity: critical
    message: "RC4 broken"
    metadata: {cwe: "CWE-327"}
  - id: elixir-rand-not-secure
    pattern: "\\b:rand\\.uniform\\s*\\(|:random\\.uniform\\s*\\("
    severity: high
    message: ":rand.uniform NOT CSPRNG — use :crypto.strong_rand_bytes"
    metadata: {cwe: "CWE-338"}
  - id: elixir-http-not-https
    pattern: "\\bhttp://[a-z]"
    severity: medium
    message: "HTTP (not HTTPS) URL"
    metadata: {cwe: "CWE-319"}
  - id: elixir-ssl-verify-none
    pattern: ":ssl\\.verify\\s*=\\s*:verify_none|verify:\\s*:verify_none"
    severity: critical
    message: "SSL verification disabled"
    metadata: {cwe: "CWE-295"}
  - id: elixir-ecto-query-string
    pattern: "\\bfrom\\s+\\w+\\s+in\\s+\\\"[^\\\"]*\\#\\{"
    severity: high
    message: "Ecto from with interpolation — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: elixir-ecto-query-string-2
    pattern: "\\bRepo\\.query\\s*\\(\\s*[\\\"'].*\\#\\{"
    severity: high
    message: "Repo.query with interpolation — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: elixir-ecto-query-concat
    pattern: "\\bRepo\\.query\\s*\\(\\s*[\\\"'][^\\\"']*\\s*<>\\s*"
    severity: high
    message: "Repo.query with concat — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: elixir-ecto-fragment-string
    pattern: "\\bfragment\\s*\\(\\s*[\\\"'].*\\#\\{"
    severity: high
    message: "fragment with interpolation — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: elixir-html-safe
    pattern: "\\bhtml_safe\\b|raw\\s*\\(\\s*(?:params|conn)"
    severity: high
    message: "html_safe/raw on user input — XSS"
    metadata: {cwe: "CWE-79"}
  - id: elixir-render-string
    pattern: "\\brender\\s*\\(\\s*[\\\"'][^\\\"']*\\#\\{"
    severity: high
    message: "render with interpolation — RCE risk"
    metadata: {cwe: "CWE-94"}
  - id: elixir-send-params
    pattern: "\\bsend\\s*\\(\\s*\\w+,\\s*(?:params|conn)"
    severity: high
    message: "send with params — method dispatch attack"
    metadata: {cwe: "CWE-913"}
  - id: elixir-apply-params
    pattern: "\\bapply\\s*\\(\\s*(?:params|conn)"
    severity: high
    message: "apply with params — method dispatch attack"
    metadata: {cwe: "CWE-913"}
  - id: elixir-string-to-atom-user
    pattern: "\\bString\\.to_atom\\s*\\(\\s*(?:params|conn)"
    severity: high
    message: "String.to_atom on user input — atom exhaustion"
    metadata: {cwe: "CWE-400"}
  - id: elixir-string-to-existing-atom
    pattern: "\\bString\\.to_existing_atom\\s*\\("
    severity: medium
    message: "String.to_existing_atom — safer but verify"
    metadata: {cwe: "CWE-400"}
  - id: elixir-iodata-to-binary-user
    pattern: "\\bIO\\.iodata_to_binary\\s*\\(\\s*(?:params|conn)"
    severity: low
    message: "IO.iodata_to_binary on user input — verify size"
    metadata: {cwe: "CWE-400"}
  - id: elixir-io-inspect-prod
    pattern: "\\bIO\\.inspect\\s*\\("
    severity: low
    message: "IO.inspect in production — use Logger"
    metadata: {cwe: "CWE-532"}
  - id: elixir-io-puts-prod
    pattern: "\\bIO\\.puts\\s*\\("
    severity: low
    message: "IO.puts in production — use Logger"
    metadata: {cwe: "CWE-532"}
  - id: elixir-require-logger
    pattern: "\\brequire Logger\\b"
    severity: low
    message: "require Logger — verify it's actually used"
    metadata: {cwe: "CWE-697"}
  - id: elixir-process-dict
    pattern: "\\bProcess\\.put\\s*\\(|Process\\.get\\s*\\("
    severity: medium
    message: "Process dictionary — implicit global state"
    metadata: {cwe: "CWE-1109"}
