rules:
- id: java-runtime-exec
  pattern: Runtime.getRuntime().exec(...)
  message: "Runtime.exec \u2014 command injection risk"
  languages:
  - java
  severity: ERROR
  metadata:
    cwe: CWE-78
    owasp: A03
- id: java-process-builder
  pattern: new ProcessBuilder(...).start()
  message: "ProcessBuilder \u2014 verify inputs are not user-controlled"
  languages:
  - java
  severity: WARNING
  metadata:
    cwe: CWE-78
- id: java-sql-string-concat
  pattern: $STMT.executeQuery("..." + $VAR + "...")
  message: "SQL query with string concat \u2014 SQL injection risk"
  languages:
  - java
  severity: ERROR
  metadata:
    cwe: CWE-89
    owasp: A03
- id: java-xml-external-entity
  pattern: DocumentBuilderFactory.newInstance()
  message: "XXE risk \u2014 disable external entities"
  languages:
  - java
  severity: WARNING
  metadata:
    cwe: CWE-611
    owasp: A05
- id: java-objectinputstream
  pattern: new ObjectInputStream(...)
  message: "Java deserialization \u2014 RCE risk"
  languages:
  - java
  severity: ERROR
  metadata:
    cwe: CWE-502
    owasp: A08
- id: java-java-md5
  pattern: MessageDigest.getInstance("MD5")
  message: "MD5 \u2014 cryptographically broken"
  languages:
  - java
  severity: WARNING
  metadata:
    cwe: CWE-327
- id: java-java-sha1
  pattern: MessageDigest.getInstance("SHA1")
  message: "SHA1 \u2014 cryptographically broken"
  languages:
  - java
  severity: WARNING
  metadata:
    cwe: CWE-327
- id: java-trust-all-certs
  pattern: TrustManager[] { ... X509TrustManager ... getAcceptedIssuers() { return
    null; } }
  message: "TrustManager returns null \u2014 accepts all certificates, MITM risk"
  languages:
  - java
  severity: ERROR
  metadata:
    cwe: CWE-295
    owasp: A02
- id: java-hardcoded-password
  pattern: String $PWD = "..."
  message: Hardcoded password
  languages:
  - java
  severity: ERROR
  metadata:
    cwe: CWE-259
    owasp: A07
- id: java-java-print-stacktrace
  pattern: $E.printStackTrace()
  message: "printStackTrace leaks info \u2014 use proper logging"
  languages:
  - java
  severity: INFO
  metadata:
    cwe: CWE-209
- id: java-java-thread-sleep-in-loop
  pattern: "while (...) {\n    Thread.sleep(...);\n}\n"
  message: "Thread.sleep in loop \u2014 likely a busy-wait, use wait/notify"
  languages:
  - java
  severity: WARNING
  metadata:
    cwe: CWE-1124
- id: java-empty-catch
  pattern: 'catch ($E $EX) {

    }

    '
  message: Empty catch block
  languages:
  - java
  severity: WARNING
  metadata:
    cwe: CWE-396
