# LoomScan Groovy Security Rules — 30 rules
rules:
  - id: groovy-eval
    pattern: "\\bEval\\s*\\.(?:me|groovy)\\s*\\("
    severity: critical
    message: "Eval — RCE on user input"
    metadata: {cwe: "CWE-94"}
  - id: groovy-eval-user
    pattern: "\\bEval\\s*\\.(?:me|groovy)\\s*\\([^,]*,\\s*(?:request|params|input)"
    severity: critical
    message: "Eval with user input — RCE"
    metadata: {cwe: "CWE-94"}
  - id: groovy-groovyshell
    pattern: "\\bGroovyShell\\s*\\(\\s*\\)\\.evaluate\\s*\\("
    severity: critical
    message: "GroovyShell.evaluate — RCE"
    metadata: {cwe: "CWE-94"}
  - id: groovy-gstring-sql
    pattern: "\\bexecute(?:Update)?\\s*\\(\\s*\\\"[^\\\"]*\\$\\{"
    severity: critical
    message: "SQL with GString interpolation — injection"
    metadata: {cwe: "CWE-89"}
  - id: groovy-gstring-sql-concat
    pattern: "\\bexecute(?:Update)?\\s*\\(\\s*\\\"[^\\\"]*\\\"\\s*\\+\\s*\\w"
    severity: high
    message: "SQL with concat — injection"
    metadata: {cwe: "CWE-89"}
  - id: groovy-system-exec
    pattern: "\\b\\\"(?:sh|bash|cmd|powershell).*\\\"\\.execute\\s*\\(\\s*\\)"
    severity: high
    message: "String.execute() — command injection"
    metadata: {cwe: "CWE-78"}
  - id: groovy-execute-user
    pattern: "\\b\\w+\\.execute\\s*\\(\\s*\\)\\s*$"
    severity: high
    message: ".execute() — verify no user input"
    metadata: {cwe: "CWE-78"}
  - id: groovy-execute-arr
    pattern: "\\b\\[.+,\\s*.+\\]\\.execute\\s*\\(\\s*\\)"
    severity: medium
    message: "Array.execute() — safer but verify args"
    metadata: {cwe: "CWE-78"}
  - id: groovy-runtime-exec
    pattern: "\\bRuntime\\.getRuntime\\(\\)\\.exec\\s*\\("
    severity: high
    message: "Runtime.exec — command injection risk"
    metadata: {cwe: "CWE-78"}
  - id: groovy-process-builder
    pattern: "\\bProcessBuilder\\s*\\("
    severity: medium
    message: "ProcessBuilder — verify args"
    metadata: {cwe: "CWE-78"}
  - id: groovy-md5
    pattern: "\\bMessageDigest\\.getInstance\\s*\\(\\s*['\\\"]MD5['\\\"]\\s*\\)"
    severity: high
    message: "MD5 broken — use SHA-256"
    metadata: {cwe: "CWE-327"}
  - id: groovy-sha1
    pattern: "\\bMessageDigest\\.getInstance\\s*\\(\\s*['\\\"]SHA-?1['\\\"]\\s*\\)"
    severity: high
    message: "SHA1 broken — use SHA-256"
    metadata: {cwe: "CWE-327"}
  - id: groovy-random-not-secure
    pattern: "\\bnew\\s+Random\\s*\\(\\s*\\)|Math\\.random\\s*\\(\\s*\\)"
    severity: high
    message: "Random not CSPRNG — use SecureRandom"
    metadata: {cwe: "CWE-338"}
  - id: groovy-hardcoded-secret
    pattern: "\\b(?:def\\s+)?(?:password|secret|api[_-]?key|auth[_-]?token)\\s*=\\s*['\\\"][^'\\\"]{8,}['\\\"]"
    severity: high
    message: "Hardcoded secret"
    metadata: {cwe: "CWE-798"}
  - id: groovy-http-not-https
    pattern: "\\bnew\\s+URL\\s*\\(\\s*['\\\"]http://|HttpURLConnection\\s*\\(\\s*['\\\"]http://"
    severity: medium
    message: "HTTP (not HTTPS) URL"
    metadata: {cwe: "CWE-319"}
  - id: groovy-ssl-verify-false
    pattern: "\\bsetHostnameVerifier\\s*\\(\\s*\\{[^}]*true\\b|verify\\s*=\\s*false"
    severity: critical
    message: "SSL verification disabled"
    metadata: {cwe: "CWE-295"}
  - id: groovy-println-prod
    pattern: "\\bprintln\\s+"
    severity: low
    message: "println in production — use logging"
    metadata: {cwe: "CWE-532"}
  - id: groovy-printstacktrace
    pattern: "\\.printStackTrace\\s*\\("
    severity: medium
    message: "printStackTrace — use logging"
    metadata: {cwe: "CWE-532"}
  - id: groovy-catch-exception
    pattern: "\\bcatch\\s*\\(\\s*\\w+\\s+\\w+\\s*\\)\\s*\\{"
    severity: medium
    message: "catch Exception — too broad"
    metadata: {cwe: "CWE-396"}
  - id: groovy-empty-catch
    pattern: "\\bcatch\\s*\\([^)]*\\)\\s*\\{\\s*\\}"
    severity: medium
    message: "Empty catch — errors swallowed"
    metadata: {cwe: "CWE-755"}
  - id: groovy-throw-ex
    pattern: "\\bthrow\\s+new\\s+\\w*Exception\\s*\\("
    severity: low
    message: "throw Exception — verify catch hierarchy"
    metadata: {cwe: "CWE-754"}
  - id: groovy-gstring-html
    pattern: "\\brender\\s*\\(\\s*(?:view|text|template)\\s*:\\s*\\\"[^\\\"]*\\$\\{"
    severity: high
    message: "render with GString — XSS risk"
    metadata: {cwe: "CWE-79"}
  - id: groovy-raw-html
    pattern: "\\braw\\s*\\(\\s*[^\\)]*\\$\\{"
    severity: high
    message: "raw with GString — XSS"
    metadata: {cwe: "CWE-79"}
  - id: groovy-redirect-user
    pattern: "\\bredirect\\s*\\(\\s*(?:url|uri)\\s*:\\s*params\\."
    severity: high
    message: "Open redirect via params"
    metadata: {cwe: "CWE-601"}
  - id: groovy-servlet-params-exec
    pattern: "\\bparams\\.\\w+\\.execute\\s*\\(\\s*\\)"
    severity: critical
    message: "params.execute() — RCE via user input"
    metadata: {cwe: "CWE-78"}
  - id: groovy-gorm-find-string
    pattern: "\\b\\w+\\.find\\s*\\(\\s*\\\"[^\\\"]*\\$\\{"
    severity: high
    message: "GORM find with GString — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: groovy-gorm-where-string
    pattern: "\\b\\w+\\.where\\s*\\(\\s*\\\"[^\\\"]*\\$\\{"
    severity: high
    message: "GORM where with GString — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: groovy-gorm-executeupdate
    pattern: "\\b\\w+\\.executeUpdate\\s*\\(\\s*\\\"[^\\\"]*\\$\\{"
    severity: high
    message: "GORM executeUpdate with GString — injection"
    metadata: {cwe: "CWE-89"}
  - id: groovy-yaml-load
    pattern: "\\bnew\\s+Yaml\\s*\\(\\s*\\)\\.load\\s*\\("
    severity: critical
    message: "Yaml.load — RCE on untrusted data, use loadAs"
    metadata: {cwe: "CWE-502"}
  - id: groovy-objectinputstream
    pattern: "\\bObjectInputStream\\s*\\("
    severity: critical
    message: "ObjectInputStream — RCE on deserialization"
    metadata: {cwe: "CWE-502"}
