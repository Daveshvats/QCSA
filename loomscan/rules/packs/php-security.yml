# LoomScan PHP Security Rules — 102 rules
rules:
  - id: php-eval
    pattern: "\\beval\\s*\\("
    severity: critical
    message: "eval() — code injection"
    metadata: {cwe: "CWE-95"}
  - id: php-exec
    pattern: "\\b(?:exec|shell_exec|system|passthru|popen|proc_open)\\s*\\("
    severity: high
    message: "Command execution — injection risk"
    metadata: {cwe: "CWE-78"}
  - id: php-unserialize
    pattern: "\\bunserialize\\s*\\("
    severity: critical
    message: "unserialize — PHP object injection RCE"
    metadata: {cwe: "CWE-502"}
  - id: php-mysql-deprecated
    pattern: "\\bmysql_(?:query|connect|fetch)\\s*\\("
    severity: critical
    message: "Deprecated mysql_* — removed in PHP 7"
    metadata: {cwe: "CWE-89"}
  - id: php-md5
    pattern: "\\bmd5\\s*\\("
    severity: high
    message: "MD5 broken"
    metadata: {cwe: "CWE-327"}
  - id: php-sha1
    pattern: "\\bsha1\\s*\\("
    severity: high
    message: "SHA1 broken"
    metadata: {cwe: "CWE-327"}
  - id: php-rand
    pattern: "\\b(?:rand|mt_rand)\\s*\\("
    severity: high
    message: "rand/mt_rand NOT CSPRNG"
    metadata: {cwe: "CWE-338"}
  - id: php-include-user
    pattern: "(?:include|require)(?:_once)?\\s*\\(\\s*\\$_(?:GET|POST|REQUEST|COOKIE)"
    severity: critical
    message: "LFI — include of user input"
    metadata: {cwe: "CWE-98"}
  - id: php-xss-echo
    pattern: "(?:echo|print)\\s+\\$_(?:GET|POST|REQUEST|COOKIE)"
    severity: high
    message: "Echo of superglobal — XSS"
    metadata: {cwe: "CWE-79"}
  - id: php-sql-superglobal
    pattern: "(?:mysql_query|mysqli_query|->query|->execute)\\s*\\(\\s*[\\\"\\`].*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "SQL with superglobal — injection"
    metadata: {cwe: "CWE-89"}
  - id: php-header-injection
    pattern: "header\\s*\\(\\s*[\\\"\\']Location:[\\\"\\']?\\s*\\.\\s*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "Header injection / open redirect"
    metadata: {cwe: "CWE-113"}
  - id: php-session-fixation
    pattern: "session_start\\s*\\(\\s*\\)\\s*;\\s*\\n.*(?:login|authenticate)"
    severity: medium
    message: "session_start before login — session fixation"
    metadata: {cwe: "CWE-384"}
  - id: php-csrf-missing
    pattern: "<form[^>]*method\\s*=\\s*[\\\"\\']post"
    severity: medium
    message: "POST form — verify CSRF token"
    metadata: {cwe: "CWE-352"}
  - id: php-http-not-https
    pattern: "curl_setopt\\s*\\([^,]+,\\s*CURLOPT_URL\\s*,\\s*[\\\"\\']http://"
    severity: medium
    message: "HTTP (not HTTPS) request"
    metadata: {cwe: "CWE-319"}
  - id: php-ssl-verify-false
    pattern: "CURLOPT_SSL_VERIFYPEER\\s*,\\s*false|CURLOPT_SSL_VERIFYHOST\\s*,\\s*0"
    severity: high
    message: "SSL verification disabled"
    metadata: {cwe: "CWE-295"}
  - id: php-hardcoded-secret
    pattern: "\\$(?:password|secret|api_key|auth_token)\\s*=\\s*[\\\"\\'][^\\\"\\']{8,}[\\\"\\']"
    severity: high
    message: "Hardcoded secret"
    metadata: {cwe: "CWE-798"}
  - id: php-error-suppression
    pattern: "@\\s*\\w+\\s*\\("
    severity: medium
    message: "Error suppression @ — hides bugs"
    metadata: {cwe: "CWE-755"}
  - id: php-empty-catch
    pattern: "catch\\s*\\([^)]*\\)\\s*\\{\\s*\\}"
    severity: medium
    message: "Empty catch — errors swallowed"
    metadata: {cwe: "CWE-755"}
  - id: php-var-dump
    pattern: "\\bvar_dump\\s*\\("
    severity: low
    message: "var_dump in production"
    metadata: {cwe: "CWE-532"}
  - id: php-file-get-contents-user
    pattern: "file_get_contents\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "file_get_contents with user input — SSRF"
    metadata: {cwe: "CWE-918"}
  - id: php-preg-eval
    pattern: "\\bpreg_replace\\s*\\(\\s*['\\\"]/.*\\/e"
    severity: critical
    message: "preg_replace /e modifier — RCE (deprecated in 7.0)"
    metadata: {cwe: "CWE-94"}
  - id: php-create-function
    pattern: "\\bcreate_function\\s*\\("
    severity: critical
    message: "create_function — RCE (deprecated in 7.2)"
    metadata: {cwe: "CWE-94"}
  - id: php-assert-string
    pattern: "\\bassert\\s*\\(\\s*[\\\"\\']"
    severity: critical
    message: "assert with string — RCE in PHP 7"
    metadata: {cwe: "CWE-94"}
  - id: php-preg-eval-callback
    pattern: "\\bpreg_replace_callback\\s*\\(\\s*['\\\"]\\/.*\\/e"
    severity: high
    message: "preg_replace_callback — verify no eval"
    metadata: {cwe: "CWE-94"}
  - id: php-mb-ereg-replace
    pattern: "\\bmb_ereg_replace\\s*\\([^,]+,[^,]+,[^)]+\\s*['\\\"]e['\\\"]"
    severity: critical
    message: "mb_ereg_replace with e modifier — RCE"
    metadata: {cwe: "CWE-94"}
  - id: php-system-call-user
    pattern: "\\b(?:exec|system|passthru|shell_exec|popen|proc_open)\\s*\\(\\s*\\$_(?:GET|POST|REQUEST|COOKIE)"
    severity: critical
    message: "System call with superglobal — command injection"
    metadata: {cwe: "CWE-78"}
  - id: php-backtick-user
    pattern: "\\`\\s*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "Backtick with superglobal — command injection"
    metadata: {cwe: "CWE-78"}
  - id: php-extract-user
    pattern: "\\bextract\\s*\\(\\s*\\$_(?:GET|POST|REQUEST|COOKIE)"
    severity: high
    message: "extract on superglobal — variable injection"
    metadata: {cwe: "CWE-913"}
  - id: php-parse-str-no-args
    pattern: "\\bparse_str\\s*\\([^,)]+\\)\\s*;"
    severity: medium
    message: "parse_str without second arg — variable injection"
    metadata: {cwe: "CWE-913"}
  - id: php-import-request
    pattern: "\\bimport_request_variables\\s*\\("
    severity: critical
    message: "import_request_variables — removed in 5.4, registers globals"
    metadata: {cwe: "CWE-913"}
  - id: php-register-globals
    pattern: "\\bregister_globals\\s*=\\s*On"
    severity: critical
    message: "register_globals enabled — RCE surface"
    metadata: {cwe: "CWE-473"}
  - id: php-allow-url-include
    pattern: "\\ballow_url_include\\s*=\\s*On"
    severity: critical
    message: "allow_url_include enabled — RFI"
    metadata: {cwe: "CWE-98"}
  - id: php-allow-url-fopen
    pattern: "\\ballow_url_fopen\\s*=\\s*On"
    severity: high
    message: "allow_url_fopen enabled — SSRF"
    metadata: {cwe: "CWE-918"}
  - id: php-magic-quotes-gpc
    pattern: "\\bmagic_quotes_gpc\\s*=\\s*On"
    severity: medium
    message: "magic_quotes_gpc — removed in 5.4, false security"
    metadata: {cwe: "CWE-116"}
  - id: php-display-errors
    pattern: "\\bdisplay_errors\\s*=\\s*On"
    severity: medium
    message: "display_errors — info leak in production"
    metadata: {cwe: "CWE-209"}
  - id: php-expose-php
    pattern: "\\bexpose_php\\s*=\\s*On"
    severity: low
    message: "expose_php — version info leak"
    metadata: {cwe: "CWE-200"}
  - id: php-session-cookie-httponly-off
    pattern: "\\bsession\\.cookie_httponly\\s*=\\s*0|session_set_cookie_params\\s*\\([^)]*\\)\\s*(?!.*httponly)"
    severity: medium
    message: "Session cookie without httponly — XSS session theft"
    metadata: {cwe: "CWE-1004"}
  - id: php-session-cookie-secure-off
    pattern: "\\bsession\\.cookie_secure\\s*=\\s*0"
    severity: high
    message: "Session cookie without secure — MITM risk"
    metadata: {cwe: "CWE-614"}
  - id: php-session-cookie-samesite-none
    pattern: "\\bsession\\.cookie_samesite\\s*=\\s*[\\\"\\']None[\\\"\\']"
    severity: medium
    message: "Session cookie SameSite=None — CSRF risk"
    metadata: {cwe: "CWE-352"}
  - id: php-use-strict-off
    pattern: "\\bsession\\.use_strict_mode\\s*=\\s*0"
    severity: medium
    message: "Session strict mode off — session fix"
    metadata: {cwe: "CWE-384"}
  - id: php-open-basedir-empty
    pattern: "\\bopen_basedir\\s*=\\s*[\\\"\\'][\\\"\\']"
    severity: medium
    message: "open_basedir empty — no filesystem restriction"
    metadata: {cwe: "CWE-22"}
  - id: php-disable-functions-empty
    pattern: "\\bdisable_functions\\s*=\\s*[\\\"\\'][\\\"\\']"
    severity: high
    message: "disable_functions empty — dangerous funcs enabled"
    metadata: {cwe: "CWE-749"}
  - id: php-mysqli-query-string
    pattern: "\\bmysqli_query\\s*\\(\\s*[^,]+,\\s*[\\\"\\`'].*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "mysqli_query with superglobal — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: php-pdo-query-string
    pattern: "\\b->query\\s*\\(\\s*[\\\"\\`'].*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "PDO::query with superglobal — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: php-pdo-exec-string
    pattern: "\\b->exec\\s*\\(\\s*[\\\"\\`'].*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "PDO::exec with superglobal — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: php-mysql-real-escape-missing
    pattern: "(?:mysql_query|mysqli_query)\\s*\\([^,]*\\$_(?:GET|POST|REQUEST)[^)]*\\)(?!.*mysql_real_escape)"
    severity: high
    message: "Query without escaping — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: php-stmt-no-bind
    pattern: "\\b->prepare\\s*\\(\\s*[\\\"\\`'].*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "prepare with superglobal — should use bind_param"
    metadata: {cwe: "CWE-89"}
  - id: php-move-uploaded-file-no-check
    pattern: "\\bmove_uploaded_file\\s*\\([^,]+,\\s*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "move_uploaded_file destination from user — path traversal"
    metadata: {cwe: "CWE-22"}
  - id: php-file-upload-no-ext-check
    pattern: "\\$_FILES\\s*\\[[\\\"\\']\\w+[\\\"\\']\\]\\[[\\\"\\']name[\\\"\\']\\](?!.*(?:pathinfo|explode))"
    severity: medium
    message: "File upload name without extension check"
    metadata: {cwe: "CWE-434"}
  - id: php-file-upload-mime-only
    pattern: "\\$_FILES\\s*\\[[\\\"\\']\\w+[\\\"\\']\\]\\[[\\\"\\']type[\\\"\\']\\]"
    severity: high
    message: "Trusting client MIME type — use server-side check"
    metadata: {cwe: "CWE-434"}
  - id: php-file-get-contents-url
    pattern: "\\bfile_get_contents\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "file_get_contents with user URL — SSRF"
    metadata: {cwe: "CWE-918"}
  - id: php-curl-url-user
    pattern: "\\bCURLOPT_URL\\s*,\\s*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "cURL URL from user — SSRF"
    metadata: {cwe: "CWE-918"}
  - id: php-fopen-user
    pattern: "\\bfopen\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "fopen with user input — path traversal"
    metadata: {cwe: "CWE-22"}
  - id: php-readfile-user
    pattern: "\\breadfile\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "readfile with user input — path traversal"
    metadata: {cwe: "CWE-22"}
  - id: php-include-get
    pattern: "\\b(?:include|require)(?:_once)?\\s*\\(?\\s*\\$_GET"
    severity: critical
    message: "LFI/RFI via include of \\$_GET"
    metadata: {cwe: "CWE-98"}
  - id: php-include-post
    pattern: "\\b(?:include|require)(?:_one)?\\s*\\(?\\s*\\$_POST"
    severity: critical
    message: "LFI/RFI via include of \\$_POST"
    metadata: {cwe: "CWE-98"}
  - id: php-setcookie-no-httponly
    pattern: "\\bsetcookie\\s*\\([^)]*\\)(?!.*httponly)"
    severity: medium
    message: "setcookie without httponly — XSS session theft"
    metadata: {cwe: "CWE-1004"}
  - id: php-setcookie-no-secure
    pattern: "\\bsetcookie\\s*\\([^)]*\\)(?!.*secure)"
    severity: medium
    message: "setcookie without secure — MITM"
    metadata: {cwe: "CWE-614"}
  - id: php-setcookie-no-samesite
    pattern: "\\bsetcookie\\s*\\([^)]*\\)(?!.*samesite)"
    severity: low
    message: "setcookie without samesite — CSRF risk"
    metadata: {cwe: "CWE-352"}
  - id: php-hardcoded-db-creds
    pattern: "\\b(?:mysqli_connect|new PDO|mysql_connect)\\s*\\([^,]+,\\s*[\\\"\\'][^\\\"\\']+[\\\"\\'],\\s*[\\\"\\'][^\\\"\\']+[\\\"\\']"
    severity: high
    message: "Hardcoded DB credentials"
    metadata: {cwe: "CWE-798"}
  - id: php-md5-password
    pattern: "\\bmd5\\s*\\(\\s*\\$_(?:POST|GET|REQUEST)\\[[\\\"\\']password[\\\"\\']\\]"
    severity: critical
    message: "MD5 of password — broken hash, use password_hash"
    metadata: {cwe: "CWE-327"}
  - id: php-sha1-password
    pattern: "\\bsha1\\s*\\(\\s*\\$_(?:POST|GET|REQUEST)\\[[\\\"\\']password[\\\"\\']\\]"
    severity: critical
    message: "SHA1 of password — broken hash, use password_hash"
    metadata: {cwe: "CWE-327"}
  - id: php-hash-no-salt
    pattern: "\\bhash\\s*\\(\\s*[\\\"\\']sha256[\\\"\\']\\s*,\\s*\\$_(?:POST|GET|REQUEST)"
    severity: high
    message: "hash without salt — use password_hash"
    metadata: {cwe: "CWE-916"}
  - id: php-crypt-no-salt
    pattern: "\\bcrypt\\s*\\(\\s*\\$_(?:POST|GET|REQUEST)"
    severity: high
    message: "crypt without proper salt — weak"
    metadata: {cwe: "CWE-916"}
  - id: php-password-hash-default
    pattern: "\\bpassword_hash\\s*\\([^,]+,\\s*PASSWORD_DEFAULT"
    severity: low
    message: "password_hash — good practice, verify cost"
    metadata: {cwe: "CWE-916"}
  - id: php-password-verify-missing
    pattern: "\\b(?:md5|sha1)\\s*\\(\\s*\\$_(?:POST|GET|REQUEST)\\[[\\\"\\']password[\\\"\\']\\]\\)\\s*===?\\s*"
    severity: critical
    message: "Password check without password_verify — weak"
    metadata: {cwe: "CWE-521"}
  - id: php-header-setcookie
    pattern: "\\bheader\\s*\\(\\s*[\\\"\\']Set-Cookie:"
    severity: medium
    message: "header Set-Cookie — use setcookie() for proper attrs"
    metadata: {cwe: "CWE-1004"}
  - id: php-session-regen-missing
    pattern: "\\b(?:login|authenticate|sign_?in)\\s*\\(.*\\)(?!.*session_regenerate_id)"
    severity: medium
    message: "Login without session_regenerate_id — session fix"
    metadata: {cwe: "CWE-384"}
  - id: php-session-regen-after-login
    pattern: "session_regenerate_id\\s*\\(\\s*(?:true\\s*)?\\)\\s*;\\s*\\n.*(?:logout|sign_out|destroy)"
    severity: medium
    message: "session_regenerate_id after logout — wrong order"
    metadata: {cwe: "CWE-384"}
  - id: php-openssl-no-verify
    pattern: "\\bopenssl_verify\\s*\\([^)]*\\)\\s*===?\\s*(?:0|false)"
    severity: high
    message: "openssl_verify failure not handled — MITM risk"
    metadata: {cwe: "CWE-295"}
  - id: php-openssl-pad-0
    pattern: "\\bOPENSSL_SSL_VERIFY_PEER\\s*=\\s*0|ssl_verify_peer\\s*=\\s*false"
    severity: high
    message: "OpenSSL verify peer disabled — MITM"
    metadata: {cwe: "CWE-295"}
  - id: php-curl-ssl-host-0
    pattern: "\\bCURLOPT_SSL_VERIFYHOST\\s*,\\s*0"
    severity: high
    message: "cURL verify host disabled — MITM"
    metadata: {cwe: "CWE-295"}
  - id: php-random-int-missing
    pattern: "\\brand\\s*\\(\\s*\\)\\s*%\\s*\\d+|mt_rand\\s*\\(\\s*\\)\\s*%\\s*\\d+"
    severity: high
    message: "rand()%N — not CSPRNG, use random_int"
    metadata: {cwe: "CWE-338"}
  - id: php-uniqid-salt
    pattern: "\\buniqid\\s*\\("
    severity: medium
    message: "uniqid — predictable, not crypto-safe"
    metadata: {cwe: "CWE-338"}
  - id: php-str-shuffle-token
    pattern: "\\bstr_shuffle\\s*\\("
    severity: high
    message: "str_shuffle — not CSPRNG, use random_int"
    metadata: {cwe: "CWE-338"}
  - id: php-array-rand-token
    pattern: "\\barray_rand\\s*\\("
    severity: high
    message: "array_rand — not CSPRNG"
    metadata: {cwe: "CWE-338"}
  - id: php-openssl-random
    pattern: "\\bopenssl_random_pseudo_bytes\\s*\\("
    severity: low
    message: "openssl_random_pseudo_bytes — verify \\$crypto_strong flag"
    metadata: {cwe: "CWE-338"}
  - id: php-mcrypt-deprecated
    pattern: "\\bmcrypt_(?:encrypt|decrypt|create_iv)\\s*\\("
    severity: critical
    message: "mcrypt removed in 7.2 — use openssl"
    metadata: {cwe: "CWE-327"}
  - id: php-mysql-pconnect
    pattern: "\\bmysql_pconnect\\s*\\("
    severity: high
    message: "mysql_pconnect — persistent, removed in 7.0"
    metadata: {cwe: "CWE-89"}
  - id: php-mysqli-real-connect-ssl-no
    pattern: "\\bmysqli_real_connect\\s*\\([^)]*\\)(?!.*MYSQLI_CLIENT_SSL)"
    severity: medium
    message: "mysqli_real_connect without SSL — sniffable"
    metadata: {cwe: "CWE-319"}
  - id: php-unserialize-allowed
    pattern: "\\bunserialize\\s*\\(\\s*\\$_(?:GET|POST|REQUEST|COOKIE)"
    severity: critical
    message: "unserialize superglobal — RCE"
    metadata: {cwe: "CWE-502"}
  - id: php-json-encode-no-flags
    pattern: "\\bjson_encode\\s*\\([^,)]+\\)\\s*(?!.*JSON_HEX)"
    severity: low
    message: "json_encode without flags — XSS in browser"
    metadata: {cwe: "CWE-79"}
  - id: php-htmlentities-no-flags
    pattern: "\\bhtmlentities\\s*\\([^,)]+\\)\\s*(?!.*ENT_QUOTES)"
    severity: medium
    message: "htmlentities without ENT_QUOTES — XSS"
    metadata: {cwe: "CWE-79"}
  - id: php-htmlspecialchars-no-flags
    pattern: "\\bhtmlspecialchars\\s*\\([^,)]+\\)\\s*(?!.*ENT_QUOTES)"
    severity: medium
    message: "htmlspecialchars without ENT_QUOTES — XSS"
    metadata: {cwe: "CWE-79"}
  - id: php-strip-tags-low
    pattern: "\\bstrip_tags\\s*\\("
    severity: medium
    message: "strip_tags — bypassable, use htmlspecialchars"
    metadata: {cwe: "CWE-79"}
  - id: php-utf-encode
    pattern: "\\butf8_encode\\s*\\("
    severity: low
    message: "utf8_encode deprecated in 8.2"
    metadata: {cwe: "CWE-116"}
  - id: php-mb-convert-encoding-user
    pattern: "\\bmb_convert_encoding\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: medium
    message: "mb_convert_encoding user input — encoding attack"
    metadata: {cwe: "CWE-116"}
  - id: php-iconv-user
    pattern: "\\biconv\\s*\\(\\s*[^,]+,\\s*[^,]+,\\s*\\$_(?:GET|POST|REQUEST)"
    severity: medium
    message: "iconv user input — encoding attack"
    metadata: {cwe: "CWE-116"}
  - id: php-get-magic-quotes
    pattern: "\\bget_magic_quotes_gpc\\s*\\("
    severity: high
    message: "get_magic_quotes_gpc — removed in 8.0"
    metadata: {cwe: "CWE-116"}
  - id: php-magic-quotes-runtime
    pattern: "\\bset_magic_quotes_runtime\\s*\\("
    severity: high
    message: "set_magic_quotes_runtime — removed in 5.4"
    metadata: {cwe: "CWE-116"}
  - id: php-each-deprecated
    pattern: "\\beach\\s*\\("
    severity: high
    message: "each() removed in 8.0 — use foreach"
    metadata: {cwe: "CWE-477"}
  - id: php-create-function-deprecated
    pattern: "\\bcreate_function\\s*\\("
    severity: critical
    message: "create_function — removed in 8.0, use closures"
    metadata: {cwe: "CWE-477"}
  - id: php-libxml-disable-errors
    pattern: "\\blibxml_disable_entity_loader\\s*\\(\\s*false"
    severity: high
    message: "Entity loader enabled — XXE risk"
    metadata: {cwe: "CWE-611"}
  - id: php-simplexml-load-string
    pattern: "\\bsimplexml_load_string\\s*\\("
    severity: medium
    message: "simplexml_load_string — verify XXE protection"
    metadata: {cwe: "CWE-611"}
  - id: php-dom-load-html
    pattern: "\\bloadHTML\\s*\\("
    severity: medium
    message: "DOMDocument::loadHTML — verify no external entities"
    metadata: {cwe: "CWE-611"}
  - id: php-xpath-user
    pattern: "\\b->evaluate\\s*\\(\\s*[\\\"\\'][^\\\"\\']*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "XPath with user input — injection"
    metadata: {cwe: "CWE-643"}
  - id: php-preg-replace-user
    pattern: "\\bpreg_replace\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "preg_replace with user pattern — ReDoS"
    metadata: {cwe: "CWE-1333"}
  - id: php-exec-no-escapeshell
    pattern: "\\b(?:exec|system|passthru|shell_exec)\\s*\\(\\s*(?!.*escapeshellarg)"
    severity: high
    message: "exec without escapeshellarg — injection"
    metadata: {cwe: "CWE-78"}
  - id: php-escapeshellcmd-cmd
    pattern: "\\bescapeshellcmd\\s*\\("
    severity: medium
    message: "escapeshellcmd — wrong for single arg, use escapeshellarg"
    metadata: {cwe: "CWE-78"}
  - id: php-url-encode-user
    pattern: "\\burlencode\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: low
    message: "urlencode on user input — verify context"
    metadata: {cwe: "CWE-116"}
  - id: php-curl-init-user-url
    pattern: "\\bcurl_init\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "curl_init with user URL — SSRF"
    metadata: {cwe: "CWE-918"}
  - id: php-soap-client-user
    pattern: "\\bnew SoapClient\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
