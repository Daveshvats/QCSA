# Adapted rule pack — concepts from this tool adapted to Python
# Source: https://spotbugs.readthedocs.io/en/latest/bugDescriptions.html
# SpotBugs has ~400 bug patterns in 9 categories. We adapt the most valuable
# Python-equivalent patterns.
#
# SpotBugs categories:
#   BAD_PRACTICE, CORRECTNESS, MALICIOUS_CODE, MULTI_THREADING, PERFORMANCE,
#   STYLE, EXPERIMENTAL, SECURITY, I18N
#
# We map these to LoomScan's category axis:
#   BAD_PRACTICE → style
#   CORRECTNESS → correctness
#   MALICIOUS_CODE → security
#   MULTI_THREADING → reliability
#   PERFORMANCE → performance
#   SECURITY → security

rules:
  # === BAD_PRACTICE ===
  - id: spotbugs-equals-without-hashcode
    pattern: |
      def __eq__(self, other):
        ...
    message: "__eq__ defined without __hash__ (SpotBugs: EQ_DEFINE_NO_HASHCODE) — equal objects must have equal hashes"
    languages: [python]
    severity: WARNING
    metadata: { source: spotbugs, category: BAD_PRACTICE, original: EqDefinesNoHashCode }

  - id: spotbugs-finalize-not-super
    pattern: |
      def __del__(self):
        ...
    message: "Finalizer defined (SpotBugs: FI_FINALIZER) — __del__ is unreliable in Python, prefer context managers"
    languages: [python]
    severity: INFO
    metadata: { source: spotbugs, category: BAD_PRACTICE, original: FiFinalizer }

  - id: spotbugs-ignored-return-value
    pattern-either:
      - pattern: $LIST.append($X)
      - pattern: $DICT.update($OTHER)
      - pattern: $STR.replace($OLD, $NEW)
    message: "Return value ignored (SpotBugs: RV_RETURN_VALUE_IGNORED) — verify the return value is intentional. str.replace() returns a new string, doesn't modify in place."
    languages: [python]
    severity: WARNING
    metadata: { source: spotbugs, category: CORRECTNESS, original: RvReturnValueIgnored }

  # === CORRECTNESS ===
  - id: spotbugs-null-deref
    pattern: $X.method()
    message: "Possible null dereference (SpotBugs: NP_NULL_ON_SOME_PATH) — verify $X is not None before calling methods"
    languages: [python]
    severity: WARNING
    metadata: { source: spotbugs, category: CORRECTNESS, original: NpNullOnSomePath }

  - id: spotbugs-int-cast-to-float
    pattern: int($X / $Y)
    message: "Integer division cast (SpotBugs: ICAST_IDIV_CAST_TO_DOUBLE) — use // for integer division or float() for float division"
    languages: [python]
    severity: WARNING
    metadata: { source: spotbugs, category: CORRECTNESS, original: ICastIntDivision }

  - id: spotbugs-compare-string-eq
    pattern: $STR1 == $STR2
    message: "String comparison with == (SpotBugs: ES_COMPARING_STRINGS_WITH_EQ) — works in Python but consider .equals() semantics for clarity"
    languages: [python]
    severity: INFO
    metadata: { source: spotbugs, category: CORRECTNESS, original: EsComparingStrings }

  - id: spotbugs-dead-store
    pattern: |
      $X = $VAL
      $X = $OTHER
    message: "Dead store (SpotBugs: DLS_DEAD_LOCAL_STORE) — variable assigned then immediately reassigned without use"
    languages: [python]
    severity: WARNING
    metadata: { source: spotbugs, category: CORRECTNESS, original: DlsDeadLocalStore }

  - id: spotbugs-infinite-loop
    pattern: |
      while True:
        ...
    message: "Possible infinite loop (SpotBugs: IL_INFINITE_LOOP) — verify there's a break/return inside"
    languages: [python]
    severity: WARNING
    metadata: { source: spotbugs, category: CORRECTNESS, original: IlInfiniteLoop }

  - id: spotbugs-self-assignment
    pattern: $X = $X
    message: "Self assignment (SpotBugs: SA_LOCAL_SELF_ASSIGNMENT) — variable assigned to itself"
    languages: [python]
    severity: WARNING
    metadata: { source: spotbugs, category: CORRECTNESS, original: SaLocalSelfAssignment }

  # === MALICIOUS_CODE / SECURITY ===
  - id: spotbugs-hardcoded-password
    pattern-regex: "(?i)(password|passwd|pwd)\\s*[:=]\\s*[\"'][^\"']{4,}[\"']"
    message: "Hardcoded password (SpotBugs: HARD_CODE_PASSWORD) — use environment variable or secret manager"
    languages: [python]
    severity: ERROR
    metadata: { source: spotbugs, category: SECURITY, original: HardCodePassword, cwe: "CWE-259" }

  - id: spotbugs-unsafe-deserialization
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)
      - pattern: yaml.load(...)
    message: "Unsafe deserialization (SpotBugs: OBJECT_DESERIALIZATION) — verify source is trusted"
    languages: [python]
    severity: ERROR
    metadata: { source: spotbugs, category: SECURITY, original: ObjectDeserialization, cwe: "CWE-502" }

  # === MULTI_THREADING ===
  - id: spotbugs-race-condition
    pattern: |
      $GLOBAL = $VALUE
      ...
      def $FUNC(...):
        ...
        $GLOBAL = $OTHER
    message: "Possible race condition (SpotBugs: AT_OPERATION_SEQUENCE_ON_CONCURRENT_FIELD) — global modified in function without lock"
    languages: [python]
    severity: WARNING
    metadata: { source: spotbugs, category: MULTI_THREADING, original: AtOperationSequence }

  - id: spotbugs-notify-without-lock
    pattern: threading.Lock()
    message: "Lock used (SpotBugs: MWN_MISMATCHED_WAIT) — verify lock is acquired with 'with' statement, not bare acquire/release"
    languages: [python]
    severity: INFO
    metadata: { source: spotbugs, category: MULTI_THREADING, original: MwnMismatchedWait }

  # === PERFORMANCE ===
  - id: spotbugs-inefficient-string-concat
    pattern: |
      $S = ""
      for ...:
        $S = $S + $X
    message: "Inefficient string concatenation (SpotBugs: SBSC_USE_STRINGBUFFER_CONCATENATION) — use ''.join() instead"
    languages: [python]
    severity: WARNING
    metadata: { source: spotbugs, category: PERFORMANCE, original: SbscUseStringBuilder }

  - id: spotbugs-inefficient-list-contains
    pattern: |
      if $X in $LIST:
        ...
    message: "Inefficient list lookup (SpotBugs: OBL_UNSATISFIED_OBLIGATION) — for large lists, use a set for O(1) lookup"
    languages: [python]
    severity: INFO
    metadata: { source: spotbugs, category: PERFORMANCE, original: InefficientContains }

  - id: spotbugs-repeated-regex-compile
    pattern: |
      def $FUNC(...):
        ...
        re.compile(...)
    message: "Regex compiled inside function (SpotBugs: RE_CATCHES_EXCEPTION) — compile once at module level for efficiency"
    languages: [python]
    severity: INFO
    metadata: { source: spotbugs, category: PERFORMANCE, original: ReRepeatedCompile }

  # === STYLE ===
  - id: spotbugs-unused-field
    pattern: |
      class $CLASS:
        $FIELD = $VALUE
    message: "Possibly unused class field (SpotBugs: URF_UNREAD_FIELD) — verify this attribute is read somewhere"
    languages: [python]
    severity: INFO
    metadata: { source: spotbugs, category: STYLE, original: UrfUnreadField }

  - id: spotbugs-unused-param
    pattern: |
      def $FUNC($PARAM, ...):
        ...
    message: "Possibly unused parameter (SpotBugs: UP_UNUSED_PARAMETER) — verify this parameter is used in the function body"
    languages: [python]
    severity: INFO
    metadata: { source: spotbugs, category: STYLE, original: UpUnusedParameter }

  - id: spotbugs-read-should-be-class
    pattern: |
      $VAR = $VALUE
      ...
      $VAR
    message: "Module-level variable (SpotBugs: SS_SHOULD_BE_STATIC) — consider making this a class constant"
    languages: [python]
    severity: INFO
    metadata: { source: spotbugs, category: STYLE, original: SsShouldBeStatic }
