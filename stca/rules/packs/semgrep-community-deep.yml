    severity: high
    message: "os.chmod with user input — privilege escalation"
    metadata: {cwe: "CWE-269"}
  - id: sgpy-os-chown-user
    pattern: "os\\.chown\\s*\\(\\s*(?:request|input|user|args)"
    severity: critical
    message: "os.chown with user input — privilege escalation"
    metadata: {cwe: "CWE-269"}
  - id: sgpy-os-symlink-user
