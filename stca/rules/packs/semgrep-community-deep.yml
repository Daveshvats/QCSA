    severity: critical
    message: "import_module with user input — RCE"
    metadata: {cwe: "CWE-94"}
  - id: sgpy-exec-user
    pattern: "\\bexec\\s*\\(\\s*(?:request|input|user|args)"
    severity: critical
    message: "exec with user input — RCE"
    metadata: {cwe: "CWE-95"}
  - id: sgpy-compile-user
    pattern: "\\bcompile\\s*\\(\\s*(?:request|input|user|args)"
    severity: critical
    message: "compile with user input — RCE"
    metadata: {cwe: "CWE-94"}
  - id: sgpy-getattr-user
    pattern: "\\bgetattr\\s*\\(\\s*\\w+\\s*,\\s*(?:request|input|user|args)"
    severity: high
    message: "getattr with user input — method dispatch attack"
    metadata: {cwe: "CWE-913"}
  - id: sgpy-setattr-user
    pattern: "\\bsetattr\\s*\\(\\s*\\w+\\s*,\\s*(?:request|input|user|args)"
    severity: high
    message: "setattr with user input — attribute injection"
    metadata: {cwe: "CWE-913"}
  - id: sgpyglobals-user
