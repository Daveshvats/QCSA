    metadata: {cwe: "CWE-78"}
  - id: sgpy-base64-decode-exec
    pattern: "base64\\.b64decode\\s*\\([^)]*\\)\\s*\\)\\s*$"
    severity: critical
    message: "base64 decode + exec — obfuscated RCE"
    metadata: {cwe: "CWE-94"}
  - id: sgpy-hashlib-md5
    pattern: "hashlib\\.md5\\s*\\("
    severity: high
    message: "MD5 broken — use sha256"
    metadata: {cwe: "CWE-327"}
  - id: sgpy-hashlib-sha1
    pattern: "hashlib\\.sha1\\s*\\("
    severity: high
    message: "SHA1 broken — use sha256"
    metadata: {cwe: "CWE-327"}
  - id: sgpy-hashlib-md4
    pattern: "hashlib\\.new\\s*\\(\\s*['\\\"]md4['\\\"]"
    severity: critical
    message: "MD4 broken"
    metadata: {cwe: "CWE-327"}
  - id: sgpy-hmac-md5
    pattern: "hmac\\.new\\s*\\([^,]+,\\s*[^,]+,\\s*hashlib\\.md5"
    severity: high
