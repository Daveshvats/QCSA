    message: "globals() access — verify intent"
    metadata: {cwe: "CWE-913"}
  - id: sgpy-locals-user
    pattern: "\\blocals\\s*\\(\\s*\\)\\s*\\["
    severity: medium
    message: "locals() access — verify intent"
    metadata: {cwe: "CWE-913"}
  - id: sgpy-ctypes-user
    pattern: "ctypes\\.(?:CDLL|WinDLL|OleDLL|PyDLL)\\s*\\(\\s*(?:request|input|user|args)"
    severity: critical
    message: "ctypes with user input — RCE via FFI"
    metadata: {cwe: "CWE-78"}
  - id: sgpy-socket-recv
    pattern: "\\.recv\\s*\\(\\s*\\d{4,}\\s*\\)"
    severity: low
    message: "recv with large buffer — DoS risk"
    metadata: {cwe: "CWE-400"}
  - id: sgpy-socket-send-user
    pattern: "\\.send\\s*\\(\\s*(?:request|input|user|args)"
