    message: "secrets.token — good practice, verify length"
    metadata: {cwe: "CWE-338"}
  - id: sgpy-random-choice-security
    pattern: "random\\.(?:choice|choices|randint|shuffle)\\s*\\("
    severity: high
    message: "random.* not CSPRNG — use secrets"
    metadata: {cwe: "CWE-338"}
  - id: sgpy-urandom-short
    pattern: "os\\.urandom\\s*\\(\\s*[1-7]\\s*\\)"
    severity: medium
    message: "urandom with short length — insufficient entropy"
    metadata: {cwe: "CWE-338"}
  - id: sgpy-requests-no-timeout
    pattern: "requests\\.(?:get|post|put|delete|patch|head)\\s*\\([^)]*\\)(?!.*timeout)"
