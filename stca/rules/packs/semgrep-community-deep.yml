# STCA Semgrep Community Deep (multi-language) Rules — 188 rules
rules:
  - id: sgpy-subprocess-shell-true
    pattern: "subprocess\\.(?:call|run|Popen|check_call|check_output)\\s*\\([^)]*shell\\s*=\\s*True"
    severity: high
    message: "subprocess with shell=True — command injection"
    metadata: {cwe: "CWE-78"}
  - id: sgpy-subprocess-shell-true-user
    pattern: "subprocess\\.(?:call|run|Popen)\\s*\\([^)]*shell\\s*=\\s*True[^)]*(?:input|user|request|args)"
    severity: critical
    message: "subprocess shell=True with user input — RCE"
    metadata: {cwe: "CWE-78"}
  - id: sgpy-pickle-load-user
    pattern: "pickle\\.loads?\\s*\\(\\s*(?:request|input|stdin|sys\\.argv)"
    severity: critical
    message: "pickle.load on user input — RCE"
    metadata: {cwe: "CWE-502"}
  - id: sgpy-marshal-load-user
    pattern: "marshal\\.loads?\\s*\\(\\s*(?:request|input|stdin|sys\\.argv)"
    severity: critical
    message: "marshal.load on user input — RCE"
    metadata: {cwe: "CWE-502"}
  - id: sgpy-yaml-load-unsafe
    pattern: "yaml\\.load\\s*\\((?!.*Loader\\s*=\\s*yaml\\.SafeLoader)"
    severity: critical
    message: "yaml.load without SafeLoader — RCE"
    metadata: {cwe: "CWE-502"}
  - id: sgpy-yaml-full-load
    pattern: "yaml\\.full_load\\s*\\("
    severity: high
    message: "yaml.full_load — RCE on untrusted data"
    metadata: {cwe: "CWE-502"}
  - id: sgpy-yaml-unsafe-load
    pattern: "yaml\\.unsafe_load\\s*\\("
    severity: critical
    message: "yaml.unsafe_load — RCE"
    metadata: {cwe: "CWE-502"}
  - id: sgpy-xml-etree-xxe
    pattern: "xml\\.etree\\.ElementTree\\.(?:parse|fromstring|iterparse)\\s*\\("
    severity: high
    message: "ElementTree — XXE risk, use defusedxml"
    metadata: {cwe: "CWE-611"}
  - id: sgpy-xml-sax-xxe
    pattern: "xml\\.sax\\.(?:parse|make_parser)\\s*\\("
    severity: high
    message: "xml.sax — XXE risk, use defusedxml"
    metadata: {cwe: "CWE-611"}
  - id: sgpy-xml-dom-minidom
    pattern: "xml\\.dom\\.minidom\\.(?:parse|parseString)\\s*\\("
    severity: high
    message: "minidom — XXE risk, use defusedxml"
    metadata: {cwe: "CWE-611"}
  - id: sgpy-lxml-etree-xxe
    pattern: "lxml\\.etree\\.(?:parse|fromstring|HTMLParser|XMLParser)\\s*\\((?!.*resolve_entities\\s*=\\s*False)"
    severity: high
    message: "lxml.etree — XXE risk, set resolve_entities=False"
    metadata: {cwe: "CWE-611"}
  - id: sgpy-tempfile-race
    pattern: "tempfile\\.mktemp\\s*\\("
    severity: high
    message: "mktemp — race condition, use mkstemp"
    metadata: {cwe: "CWE-377"}
  - id: sgpy-os-tempfile
    pattern: "os\\.(?:tempnam|tmpnam)\\s*\\("
    severity: high
    message: "os.tempnam/tmpnam — race condition"
    metadata: {cwe: "CWE-377"}
  - id: sgpy-shutil-rmtree-user
    pattern: "shutil\\.rmtree\\s*\\(\\s*(?:request|input|user|args)"
    severity: critical
    message: "rmtree with user input — path traversal"
    metadata: {cwe: "CWE-22"}
  - id: sgpy-os-remove-user
    pattern: "os\\.(?:remove|unlink)\\s*\\(\\s*(?:request|input|user|args)"
