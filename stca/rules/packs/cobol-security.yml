# STCA COBOL Security Rules — 25 rules
rules:
  - id: cobol-accept-no-validation
    pattern: "\\bACCEPT\\s+\\w+\\s+FROM\\s+(?:CONSOLE|SYSIN)"
    severity: medium
    message: "ACCEPT without validation — input injection"
    metadata: {cwe: "CWE-20"}
  - id: cobol-accept-user
    pattern: "\\bACCEPT\\s+\\w+\\s+FROM\\s+(?:CONSOLE|SYSIN)(?!.*\\bPERFORM\\s+VALIDATE)"
    severity: medium
    message: "ACCEPT from console without validation PERFORM"
    metadata: {cwe: "CWE-20"}
  - id: cobol-hardcoded-password
    pattern: "\\bPASSWORD\\s+PIC\\s+X\\([\\d]+\\)\\s+VALUE\\s+['\\\"][^'\\\"]+['\\\"]"
    severity: high
    message: "Hardcoded password VALUE"
    metadata: {cwe: "CWE-798"}
  - id: cobol-hardcoded-secret
    pattern: "\\b(?:SECRET|API[_-]?KEY|TOKEN)\\s+PIC\\s+X\\([\\d]+\\)\\s+VALUE\\s+['\\\"][^'\\\"]+['\\\"]"
    severity: high
    message: "Hardcoded secret VALUE"
    metadata: {cwe: "CWE-798"}
  - id: cobol-move-spaces-to-passwd
    pattern: "\\bMOVE\\s+SPACES\\s+TO\\s+\\w*PASSWD\\w*"
    severity: medium
    message: "MOVE SPACES to password — verify reset intent"
    metadata: {cwe: "CWE-457"}
  - id: cobol-call-system
    pattern: "\\bCALL\\s+['\\\"]SYSTEM['\\\"]\\s+USING\\s+\\w+"
    severity: high
    message: "CALL 'SYSTEM' with variable — command injection"
    metadata: {cwe: "CWE-78"}
  - id: cobol-call-popen
    pattern: "\\bCALL\\s+['\\\"]popen['\\\"]\\s+USING\\s+\\w+"
    severity: high
    message: "CALL 'popen' — command injection"
    metadata: {cwe: "CWE-78"}
  - id: cobol-call-exec
    pattern: "\\bCALL\\s+['\\\"]exec[lv][pe]?['\\\"]\\s+USING"
    severity: high
    message: "CALL exec — command injection"
    metadata: {cwe: "CWE-78"}
  - id: cobol-display-secret
    pattern: "\\bDISPLAY\\s+\\w*PASSWD\\w*|\\bDISPLAY\\s+\\w*SECRET\\w*|\\bDISPLAY\\s+\\w*TOKEN\\w*"
    severity: high
    message: "DISPLAY of secret — info leak"
    metadata: {cwe: "CWE-532"}
  - id: cobol-display-ssn
    pattern: "\\bDISPLAY\\s+\\w*SSN\\w*|\\bDISPLAY\\s+\\w*SOCIAL\\s*SECURITY"
    severity: high
    message: "DISPLAY of SSN — PII leak"
    metadata: {cwe: "CWE-359"}
  - id: cobol-display-credit-card
    pattern: "\\bDISPLAY\\s+\\w*CC\\w*|\\bDISPLAY\\s+\\w*CREDIT\\w*|\\bDISPLAY\\s+\\w*CARD\\w*"
    severity: high
    message: "DISPLAY of credit card — PCI leak"
    metadata: {cwe: "CWE-359"}
  - id: cobol-accept-credit-card
    pattern: "\\bACCEPT\\s+\\w*CC\\w*|\\bACCEPT\\s+\\w*CREDIT\\w*|\\bACCEPT\\s+\\w*CARD\\w*"
    severity: medium
    message: "ACCEPT of credit card — verify PCI scope"
    metadata: {cwe: "CWE-359"}
  - id: cobol-go-to-dep
    pattern: "\\bGO\\s+TO\\s+\\w+\\s+DEPENDING\\s+ON\\s+\\w+"
    severity: low
    message: "GO TO DEPENDING — verify all branches safe"
    metadata: {cwe: "CWE-754"}
  - id: cobol-alter-statement
    pattern: "\\bALTER\\s+\\w+\\s+TO\\s+PROCEED\\s+TO\\s+\\w+"
    severity: medium
    message: "ALTER — changes GOTO target at runtime, fragile"
    metadata: {cwe: "CWE-754"}
  - id: cobol-stop-run
    pattern: "\\bSTOP\\s+RUN\\b"
    severity: low
    message: "STOP RUN — verify cleanup PERFORMs ran first"
    metadata: {cwe: "CWE-459"}
  - id: cobol-exit-program
    pattern: "\\bEXIT\\s+PROGRAM\\b"
    severity: low
    message: "EXIT PROGRAM — verify state saved"
    metadata: {cwe: "CWE-459"}
  - id: cobol-integer-overflow
    pattern: "\\bCOMPUTE\\s+\\w+\\s*=\\s*\\w+\\s*\\*\\s*\\w+"
    severity: medium
    message: "COMPUTE multiply — verify overflow handling"
    metadata: {cwe: "CWE-190"}
  - id: cobol-subtract-overflow
    pattern: "\\bSUBTRACT\\s+\\w+\\s+FROM\\s+\\w+\\s+GIVING\\s+\\w+"
    severity: low
    message: "SUBTRACT — verify negative handling"
    metadata: {cwe: "CWE-191"}
  - id: cobol-file-open-no-status
    pattern: "\\bOPEN\\s+(?:INPUT|OUTPUT|I-O|EXTEND)\\s+\\w+(?!.*FILE\\s+STATUS)"
    severity: medium
    message: "OPEN without FILE STATUS — silent failures"
    metadata: {cwe: "CWE-755"}
  - id: cobol-read-no-status-check
    pattern: "\\bREAD\\s+\\w+(?!.*\\bAT\\s+END\\b)"
    severity: medium
    message: "READ without AT END — silent EOF"
    metadata: {cwe: "CWE-755"}
  - id: cobol-write-no-status-check
    pattern: "\\bWRITE\\s+\\w+(?!.*\\bINVALID\\s+KEY\\b)"
    severity: medium
    message: "WRITE without INVALID KEY — silent failure"
    metadata: {cwe: "CWE-755"}
  - id: cobol-rewrite-no-status
    pattern: "\\bREWRITE\\s+\\w+(?!.*\\bINVALID\\s+KEY\\b)"
    severity: medium
    message: "REWRITE without INVALID KEY — silent failure"
    metadata: {cwe: "CWE-755"}
  - id: cobol-delete-no-status
    pattern: "\\bDELETE\\s+\\w+(?!.*\\bINVALID\\s+KEY\\b)"
    severity: medium
    message: "DELETE without INVALID KEY — silent failure"
    metadata: {cwe: "CWE-755"}
  - id: cobol-mixed-data
    pattern: "\\bUSAGE\\s+IS\\s+COMP-3\\b"
    severity: low
    message: "COMP-3 packed decimal — verify precision on conversion"
    metadata: {cwe: "CWE-682"}
  - id: cobol-copybook-include
    pattern: "\\bCOPY\\s+\\w+(?!.*\\bREPLACING\\b)"
    severity: low
    message: "COPY without REPLACING — verify copybook is trusted"
    metadata: {cwe: "CWE-829"}
