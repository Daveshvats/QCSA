    pattern: "const\\s+app\\s*=\\s*express\\s*\\(\\s*\\)(?!.*helmet)"
    severity: low
    message: "Express without helmet — missing security headers"
    metadata: {cwe: "CWE-693"}
  - id: ex-cors-wildcard
    pattern: "app\\.use\\s*\\(\\s*cors\\s*\\(\\s*\\{[^}]*origin\\s*:\\s*['\\\"]\\*['\\\"]"
    severity: high
    message: "Express CORS wildcard origin"
    metadata: {cwe: "CWE-942"}
  - id: ex-cors-credentials-wildcard
    pattern: "app\\.use\\s*\\(\\s*cors\\s*\\(\\s*\\{[^}]*credentials\\s*:\\s*true[^}]*origin\\s*:\\s*['\\\"]\\*['\\\"]"
    severity: critical
    message: "Express CORS credentials + wildcard — CSRF"
    metadata: {cwe: "CWE-942"}
  - id: ex-body-limit-large
    pattern: "express\\.json\\s*\\(\\s*\\{\\s*limit\\s*:\\s*['\\\"]?\\d{4,}"
