rules:
- id: js-eval
  pattern: eval(...)
  message: "eval() \u2014 code injection risk"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-95
    owasp: A03
- id: js-new-function
  pattern: new Function(...)
  message: "new Function() \u2014 code injection risk"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-95
- id: js-child-process-exec
  pattern: child_process.exec(...)
  message: "child_process.exec \u2014 shell injection risk"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-78
    owasp: A03
- id: js-child-process-exec-shell
  pattern: 'child_process.exec(..., { shell: true })'
  message: "child_process.exec with shell:true \u2014 shell injection"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-78
- id: js-innerhtml
  pattern: $EL.innerHTML = ...
  message: "innerHTML assignment \u2014 XSS risk"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-79
    owasp: A03
- id: js-document-write
  pattern: document.write(...)
  message: "document.write \u2014 XSS risk"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-79
    owasp: A03
- id: js-dangerouslysetinnerhtml
  pattern: $EL.dangerouslySetInnerHTML = ...
  message: "React dangerouslySetInnerHTML \u2014 XSS risk"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-79
    owasp: A03
- id: javascript-js-object-assign-merge
  pattern: require('extend')(...)
  message: "extend() \u2014 verify deep option, prototype pollution risk"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-1321
- id: js-merge-deep
  pattern: '$OBJ.merge(..., ..., { deep: true })'
  message: "Deep merge \u2014 prototype pollution risk"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-1321
- id: js-request-no-verify
  pattern: process.env.NODE_TLS_REJECT_UNAUTHORIZED = "0"
  message: "TLS verification globally disabled \u2014 MITM risk"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-295
    owasp: A02
- id: js-axios-no-verify
  pattern: 'axios(..., { httpsAgent: ... rejectUnauthorized: false })'
  message: Axios with TLS verification disabled
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-295
- id: js-hardcoded-secret
  pattern-regex: (?i)(api_key|secret|token|password)\s*[:=]\s*["'][a-zA-Z0-9]{20,}["']
  message: Hardcoded secret
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-798
    owasp: A05
- id: javascript-js-jwt-none-alg
  pattern: 'jwt.verify(..., { algorithms: ["none"] })'
  message: "JWT alg:none \u2014 bypasses verification"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-345
- id: javascript-js-jwt-sync-verify-false
  pattern: 'jwt.verify(..., ..., { verify: false })'
  message: JWT verification disabled
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-345
- id: javascript-js-fs-read-user-input
  pattern: fs.readFile($INPUT, ...)
  message: "fs.readFile with potentially user-controlled input \u2014 path traversal\
    \ risk"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-22
    owasp: A01
- id: javascript-js-path-join-user-input
  pattern: path.join(..., $INPUT)
  message: "path.join with potentially user-controlled input \u2014 path traversal\
    \ risk"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-22
- id: js-sql-template-literal
  pattern: $DB.query(`...${...}...`)
  message: "SQL query with template literal \u2014 SQL injection risk"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-89
    owasp: A03
- id: js-sql-string-concat
  pattern: $DB.query("..." + $VAR + "...")
  message: "SQL query with string concat \u2014 SQL injection risk"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-89
    owasp: A03
- id: js-regex-user-input
  pattern: new RegExp($INPUT)
  message: "RegExp from user input \u2014 ReDoS risk"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-1333
    owasp: A05
- id: js-console-log-secret
  pattern-regex: console\.(log|error|warn)\(.*?(password|secret|token|api_key).*?\)
  message: console.log references secret/PII
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-532
    owasp: A09
- id: javascript-js-await-in-loop
  pattern: "for (...) {\n  ...\n  await ...\n}\n"
  message: "await inside loop \u2014 sequential instead of parallel, performance bug"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-1058
- id: js-catch-empty
  pattern: 'catch ($E) {

    }

    '
  message: "Empty catch block \u2014 swallows errors silently"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-396
- id: js-process-env-default
  pattern: process.env.$KEY || "..."
  message: "Fallback string for env var \u2014 verify it's not a secret"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-798
