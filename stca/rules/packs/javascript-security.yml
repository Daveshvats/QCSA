# Bundled Semgrep rule pack — JavaScript & TypeScript security
rules:
  # === Injection ===
  - id: js-eval
    pattern: eval(...)
    message: eval() — code injection risk
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-95", owasp: "A03" }

  - id: js-new-function
    pattern: new Function(...)
    message: new Function() — code injection risk
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-95" }

  - id: js-child-process-exec
    pattern: child_process.exec(...)
    message: child_process.exec — shell injection risk
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-78", owasp: "A03" }

  - id: js-child-process-exec-shell
    pattern: "child_process.exec(..., { shell: true })"
    message: child_process.exec with shell:true — shell injection
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-78" }

  # === XSS ===
  - id: js-innerhtml
    pattern: $EL.innerHTML = ...
    message: innerHTML assignment — XSS risk
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-79", owasp: "A03" }

  - id: js-document-write
    pattern: document.write(...)
    message: document.write — XSS risk
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-79", owasp: "A03" }

  - id: js-dangerouslysetinnerhtml
    pattern: $EL.dangerouslySetInnerHTML = ...
    message: React dangerouslySetInnerHTML — XSS risk
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-79", owasp: "A03" }

  # === Prototype Pollution ===
  - id: js-object-assign-merge
    pattern: require('extend')(...)
    message: extend() — verify deep option, prototype pollution risk
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-1321" }

  - id: js-merge-deep
    pattern: "$OBJ.merge(..., ..., { deep: true })"
    message: Deep merge — prototype pollution risk
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-1321" }

  # === SSRF / Network ===
  - id: js-request-no-verify
    pattern: process.env.NODE_TLS_REJECT_UNAUTHORIZED = "0"
    message: TLS verification globally disabled — MITM risk
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-295", owasp: "A02" }

  - id: js-axios-no-verify
    pattern: "axios(..., { httpsAgent: ... rejectUnauthorized: false })"
    message: Axios with TLS verification disabled
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-295" }

  # === Authentication ===
  - id: js-hardcoded-secret
    pattern-regex: "(?i)(api_key|secret|token|password)\\s*[:=]\\s*[\"'][a-zA-Z0-9]{20,}[\"']"
    message: Hardcoded secret
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-798", owasp: "A05" }

  - id: js-jwt-none-alg
    pattern: "jwt.verify(..., { algorithms: [\"none\"] })"
    message: JWT alg:none — bypasses verification
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-345" }

  - id: js-jwt-sync-verify-false
    pattern: "jwt.verify(..., ..., { verify: false })"
    message: JWT verification disabled
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-345" }

  # === Path Traversal ===
  - id: js-fs-read-user-input
    pattern: fs.readFile($INPUT, ...)
    message: fs.readFile with potentially user-controlled input — path traversal risk
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-22", owasp: "A01" }

  - id: js-path-join-user-input
    pattern: path.join(..., $INPUT)
    message: path.join with potentially user-controlled input — path traversal risk
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-22" }

  # === SQL Injection ===
  - id: js-sql-template-literal
    pattern: $DB.query(`...${...}...`)
    message: SQL query with template literal — SQL injection risk
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-89", owasp: "A03" }

  - id: js-sql-string-concat
    pattern: $DB.query("..." + $VAR + "...")
    message: SQL query with string concat — SQL injection risk
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-89", owasp: "A03" }

  # === Regex DoS (ReDoS) ===
  - id: js-regex-user-input
    pattern: new RegExp($INPUT)
    message: RegExp from user input — ReDoS risk
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-1333", owasp: "A05" }

  # === Information Disclosure ===
  - id: js-console-log-secret
    pattern-regex: "console\\.(log|error|warn)\\(.*?(password|secret|token|api_key).*?\\)"
    message: console.log references secret/PII
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-532", owasp: "A09" }

  # === Business Logic ===
  - id: js-await-in-loop
    pattern: |
      for (...) {
        ...
        await ...
      }
    message: await inside loop — sequential instead of parallel, performance bug
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-1058" }

  - id: js-catch-empty
    pattern: |
      catch ($E) {
      }
    message: Empty catch block — swallows errors silently
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-396" }

  - id: js-process-env-default
    pattern: process.env.$KEY || "..."
    message: Fallback string for env var — verify it's not a secret
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-798" }
