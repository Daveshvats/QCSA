# STCA Haskell Security Rules — 30 rules
rules:
  - id: haskell-unsafe-performIO
    pattern: "\\bunsafePerformIO\\b"
    severity: high
    message: "unsafePerformIO — breaks referential transparency"
    metadata: {cwe: "CWE-754"}
  - id: haskell-unsafe-coerce
    pattern: "\\bunsafeCoerce\\b"
    severity: critical
    message: "unsafeCoerce — type confusion, UB"
    metadata: {cwe: "CWE-843"}
  - id: haskell-unsafe-stToIO
    pattern: "\\bunsafeSTToIO\\b"
    severity: high
    message: "unsafeSTToIO — breaks state thread isolation"
    metadata: {cwe: "CWE-754"}
  - id: haskell-unsafe-foreign
    pattern: "\\bunsafeForeignImportCall\\b"
    severity: high
    message: "unsafeForeignImportCall — concurrency UB"
    metadata: {cwe: "CWE-754"}
  - id: haskell-read-file-user
    pattern: "\\breadFile\\s*\\=\\s*\\<\\s*(?:getArgs|getLine|getContents)"
    severity: high
    message: "readFile with user input — path traversal"
    metadata: {cwe: "CWE-22"}
  - id: haskell-appendFile-user
    pattern: "\\bappendFile\\s*\\s*<\\$\\>\\s*(?:getArgs|getLine)"
    severity: high
    message: "appendFile with user input — path traversal"
    metadata: {cwe: "CWE-22"}
  - id: haskell-system
    pattern: "\\bSystem\\.Process\\.system\\b|callSystem\\b|rawSystem\\b"
    severity: high
    message: "system/rawSystem — command injection"
    metadata: {cwe: "CWE-78"}
  - id: haskell-callCommand
    pattern: "\\bcallCommand\\s*\\$\\s*(?:getArgs|getLine)"
    severity: critical
    message: "callCommand with user input — RCE"
    metadata: {cwe: "CWE-78"}
  - id: haskell-readProcess-user
    pattern: "\\breadProcess\\s*\\([^,]+,\\s*(?:getArgs|getLine)"
    severity: high
    message: "readProcess with user input — injection risk"
    metadata: {cwe: "CWE-78"}
  - id: haskell-spawnProcess-user
    pattern: "\\bspawnProcess\\s*\\([^,]*,\\s*(?:getArgs|getLine)"
    severity: high
    message: "spawnProcess with user input — injection"
    metadata: {cwe: "CWE-78"}
  - id: haskell-md5
    pattern: "\\bData\\.Digest\\.MD5\\b|hashMD5\\b"
    severity: high
    message: "MD5 broken — use SHA-256"
    metadata: {cwe: "CWE-327"}
  - id: haskell-sha1
    pattern: "\\bData\\.Digest\\.SHA1\\b|hashSHA1\\b"
    severity: high
    message: "SHA1 broken — use SHA-256"
    metadata: {cwe: "CWE-327"}
  - id: haskell-arc4
    pattern: "\\bCrypto\\.Cipher\\.ARC4\\b"
    severity: critical
    message: "RC4 broken"
    metadata: {cwe: "CWE-327"}
  - id: haskell-des
    pattern: "\\bCrypto\\.Cipher\\.DES\\b"
    severity: critical
    message: "DES broken — 56-bit key"
    metadata: {cwe: "CWE-327"}
  - id: haskell-blowsfish
    pattern: "\\bCrypto\\.Cipher\\.Blowfish\\b"
    severity: medium
    message: "Blowfish — verify use case (not for new code)"
    metadata: {cwe: "CWE-327"}
  - id: haskell-random-not-secure
    pattern: "\\bSystem\\.Random\\b"
    severity: high
    message: "System.Random NOT CSPRNG — use Crypto.Random"
    metadata: {cwe: "CWE-338"}
  - id: haskell-mkStdGen
    pattern: "\\bmkStdGen\\b"
    severity: high
    message: "mkStdGen predictable — use Crypto.Random"
    metadata: {cwe: "CWE-338"}
  - id: haskell-hardcoded-secret
    pattern: "\\b(?:password|secret|api[_-]?key|auth[_-]?token)\\s*=\\s*[\\\"'][^\\\"']{8,}[\\\"']"
    severity: high
    message: "Hardcoded secret"
    metadata: {cwe: "CWE-798"}
  - id: haskell-http-not-https
    pattern: "\\bhttp://[a-z]"
    severity: medium
    message: "HTTP (not HTTPS) URL"
    metadata: {cwe: "CWE-319"}
  - id: haskell-simpleHTTP
    pattern: "\\bNetwork\\.HTTP\\.simpleHTTP\\b"
    severity: medium
    message: "simpleHTTP — verify TLS (use http-client-tls)"
    metadata: {cwe: "CWE-319"}
  - id: haskell-ssl-verify-none
    pattern: "\\bTLSSettingsSimple\\b.*\\.disableCertificateValidation\\s*=\\s*True"
    severity: critical
    message: "SSL verification disabled"
    metadata: {cwe: "CWE-295"}
  - id: haskell-putstrln-prod
    pattern: "\\bputStrLn\\b"
    severity: low
    message: "putStrLn in production — use structured logging"
    metadata: {cwe: "CWE-532"}
  - id: haskell-putstr-prod
    pattern: "\\bputStr\\b"
    severity: low
    message: "putStr in production — use structured logging"
    metadata: {cwe: "CWE-532"}
  - id: haskell-print-prod
    pattern: "\\bprint\\b"
    severity: low
    message: "print in production — use structured logging"
    metadata: {cwe: "CWE-532"}
  - id: haskell-error
    pattern: "\\berror\\s*\\("
    severity: medium
    message: "error — partial function, throws exception"
    metadata: {cwe: "CWE-754"}
  - id: haskell-undefined
    pattern: "\\bundefined\\b"
    severity: high
    message: "undefined — throws exception at runtime"
    metadata: {cwe: "CWE-754"}
  - id: haskell-tail-empty
    pattern: "\\bData\\.List\\.tail\\b"
    severity: medium
    message: "tail on empty list — partial function"
    metadata: {cwe: "CWE-754"}
  - id: haskell-head-empty
    pattern: "\\bData\\.List\\.head\\b"
    severity: medium
    message: "head on empty list — partial function"
    metadata: {cwe: "CWE-754"}
  - id: haskell-fromJust
    pattern: "\\bData\\.Maybe\\.fromJust\\b"
    severity: high
    message: "fromJust on Nothing — partial function"
    metadata: {cwe: "CWE-754"}
  - id: haskell-read
    pattern: "\\bData\\.Text\\.Read\\b|Text\\.Read\\.readEither\\b"
    severity: medium
    message: "read — verify error handling (use readEither)"
    metadata: {cwe: "CWE-754"}
