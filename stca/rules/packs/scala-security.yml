# STCA Scala Security Rules — 30 rules
rules:
  - id: scala-runtime-exec
    pattern: "\\bRuntime\\.getRuntime\\.exec\\s*\\("
    severity: high
    message: "Runtime.exec — command injection risk"
    metadata: {cwe: "CWE-78"}
  - id: scala-process-string
    pattern: "\\bProcess\\s*\\(\\s*[\\\"\\'].*\\$\\{"
    severity: high
    message: "Process with string interpolation — injection"
    metadata: {cwe: "CWE-78"}
  - id: scala-process-!!-user
    pattern: "\\bProcess\\s*\\([^)]+\\)\\.!!\\s*$"
    severity: high
    message: "Process.!! — verify input is not user"
    metadata: {cwe: "CWE-78"}
  - id: scala-md5
    pattern: "\\bMessageDigest\\.getInstance\\s*\\(\\s*[\\\"\\']MD5[\\\"\\']"
    severity: high
    message: "MD5 broken — use SHA-256"
    metadata: {cwe: "CWE-327"}
  - id: scala-sha1
    pattern: "\\bMessageDigest\\.getInstance\\s*\\(\\s*[\\\"\\']SHA-?1[\\\"\\']"
    severity: high
    message: "SHA1 broken — use SHA-256"
    metadata: {cwe: "CWE-327"}
  - id: scala-des-md5
    pattern: "\\bMessageDigest\\.getInstance\\s*\\(\\s*[\\\"\\']DES[\\\"\\']"
    severity: critical
    message: "DES broken — 56-bit key"
    metadata: {cwe: "CWE-327"}
  - id: scala-random-not-secure
    pattern: "\\bnew\\s+Random\\s*\\(|scala\\.util\\.Random\\b"
    severity: high
    message: "scala.util.Random not CSPRNG — use SecureRandom"
    metadata: {cwe: "CWE-338"}
  - id: scala-secure-random-default
    pattern: "\\bnew\\s+SecureRandom\\s*\\(\\s*\\)"
    severity: low
    message: "SecureRandom() — verify seeding"
    metadata: {cwe: "CWE-338"}
  - id: scala-hardcoded-secret
    pattern: "\\b(?:val|var|def)\\s+(?:password|secret|api[_-]?key|auth[_-]?token)\\s*[:=]\\s*[\\\"\\'][^\\\"\\']{8,}[\\\"\\']"
    severity: high
    message: "Hardcoded secret"
    metadata: {cwe: "CWE-798"}
  - id: scala-jdbc-string-format
    pattern: "\\bStatement\\s*\\.\\s*execute(?:Query|Update)?\\s*\\(\\s*s[\\\"\\']"
    severity: high
    message: "JDBC execute with s string — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: scala-jdbc-concat
    pattern: "\\bStatement\\s*\\.\\s*execute(?:Query|Update)?\\s*\\(\\s*[\\\"\\'][^\\\"\\']*\\s*\\+\\s*\\w"
    severity: high
    message: "JDBC execute with concat — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: scala-slick-string
    pattern: "\\bsql[\\\"\\'].*\\$\\{"
    severity: high
    message: "Slick sql\"...\" with interpolation — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: scala-doobie-string
    pattern: "\\bfr[\\\"\\'].*\\$\\{"
    severity: high
    message: "Doobie fr\"...\" with interpolation — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: scala-anorm-string
    pattern: "\\bSQL\\s*\\(\\s*s[\\\"\\']"
    severity: high
    message: "Anorm SQL with s interpolation — SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: scala-objectinputstream
    pattern: "\\bObjectInputStream\\b"
    severity: critical
    message: "ObjectInputStream — RCE on deserialization"
    metadata: {cwe: "CWE-502"}
  - id: scala-read-object
    pattern: "\\.readObject\\s*\\("
    severity: critical
    message: "readObject — RCE on untrusted data"
    metadata: {cwe: "CWE-502"}
  - id: scala-xml-load-string
    pattern: "\\bXML\\.loadString\\s*\\("
    severity: high
    message: "XML.loadString — XXE risk"
    metadata: {cwe: "CWE-611"}
  - id: scala-xml-load-url
    pattern: "\\bXML\\.load\\s*\\("
    severity: medium
    message: "XML.load — verify XXE protection"
    metadata: {cwe: "CWE-611"}
  - id: scala-println-prod
    pattern: "\\bprintln\\s*\\("
    severity: low
    message: "println in production — use slf4j/logback"
    metadata: {cwe: "CWE-532"}
  - id: scala-printstacktrace
    pattern: "\\.printStackTrace\\s*\\("
    severity: medium
    message: "printStackTrace — use proper logging"
    metadata: {cwe: "CWE-532"}
  - id: scala-try-catch-fatal
    pattern: "\\bcatch\\s*\\{\\s*case\\s+(?:e|ex|exc)\\s*:\\s*Throwable"
    severity: medium
    message: "catch Throwable — too broad, masks fatal errors"
    metadata: {cwe: "CWE-396"}
  - id: scala-await-result
    pattern: "\\bAwait\\.result\\s*\\("
    severity: medium
    message: "Await.result — blocking, deadlock risk"
    metadata: {cwe: "CWE-833"}
  - id: scala-await-ready
    pattern: "\\bAwait\\.ready\\s*\\("
    severity: medium
    message: "Await.ready — blocking"
    metadata: {cwe: "CWE-833"}
  - id: scala-future-oncomplete-side-effect
    pattern: "\\bFuture\\s*\\{[^}]*\\}\\.onComplete"
    severity: low
    message: "Future.onComplete — side-effecting, verify intent"
    metadata: {cwe: "CWE-754"}
  - id: scala-var-shared
    pattern: "\\bclass\\s+\\w+[^{]*\\{[^}]*\\bvar\\s+\\w+"
    severity: medium
    message: "Class with var — mutable state, thread-safety risk"
    metadata: {cwe: "CWE-362"}
  - id: scala-sync-block
    pattern: "\\bsynchronized\\s*\\{"
    severity: medium
    message: "synchronized block — deadlock risk"
    metadata: {cwe: "CWE-667"}
  - id: scala-actor-!
    pattern: "\\b!\\s*\\w+\\.\\w+"
    severity: low
    message: "Actor ! — verify message contract"
    metadata: {cwe: "CWE-662"}
  - id: scala-null-var
    pattern: "\\bvar\\s+\\w+\\s*:\\s*\\w+\\s*=\\s*null\\b"
    severity: high
    message: "var = null — NullPointerException risk, use Option"
    metadata: {cwe: "CWE-690"}
  - id: scala-null-return
    pattern: "\\breturn\\s+null\\b"
    severity: medium
    message: "return null — use Option instead"
    metadata: {cwe: "CWE-690"}
  - id: scala-get-or-else-null
    pattern: "\\.getOrElse\\s*\\(\\s*null\\s*\\)"
    severity: medium
    message: "getOrElse(null) — use getOrElse(default)"
    metadata: {cwe: "CWE-690"}
