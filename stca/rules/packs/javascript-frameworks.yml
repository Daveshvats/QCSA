rules:
- id: express-no-helmet
  pattern: app.use(...)
  message: "Express app \u2014 verify helmet() is used for security headers"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-693
- id: express-cors-wildcard
  pattern: 'cors({ origin: "*" })'
  message: "Express CORS with origin='*' \u2014 allows any origin"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-942
- id: express-csrf-disabled
  pattern: 'csurf({ cookie: false })'
  message: "Express CSRF disabled \u2014 verify this is intentional"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-352
- id: express-body-parser-large
  pattern: 'express.json({ limit: "100mb" })'
  message: "Express body parser with high limit \u2014 DoS risk"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-400
- id: express-redirect-user-input
  pattern: res.redirect($URL)
  message: "Express redirect \u2014 open redirect if $URL is user-controlled"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-601
- id: express-static-public
  pattern: express.static($DIR)
  message: "Express static \u2014 verify $DIR doesn't contain sensitive files"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-200
- id: react-dangerouslysetinnerhtml
  pattern: $EL.dangerouslySetInnerHTML = ...
  message: "React dangerouslySetInnerHTML \u2014 XSS risk"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-79
- id: react-href-user-input
  pattern: <a href={$URL}>
  message: "React <a href> with user input \u2014 XSS via javascript: URL"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-79
- id: react-eval-in-render
  pattern: eval($X)
  message: "eval() in React component \u2014 code injection"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-95
- id: react-useeffect-no-cleanup
  pattern: useEffect(() => { ... })
  message: "useEffect without cleanup \u2014 may cause memory leaks"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-404
- id: react-setstate-in-render
  pattern: this.setState(...)
  message: "setState in render \u2014 infinite loop"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-835
- id: nextjs-getserverSideProps-no-auth
  pattern: getServerSideProps(...)
  message: "Next.js getServerSideProps \u2014 verify auth check if page is protected"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-862
- id: nextjs-api-route-no-csrf
  pattern: export default function handler(req, res)
  message: "Next.js API route \u2014 verify CSRF protection"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-352
- id: nextjs-redirect-user-input
  pattern: 'return { redirect: { destination: $URL } }'
  message: "Next.js redirect \u2014 open redirect if $URL is user-controlled"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-601
- id: nestjs-controller-no-auth
  pattern: '@Controller($PATH)'
  message: "NestJS controller \u2014 verify @UseGuards(AuthGuard) if route is protected"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-862
- id: js-mongodb-find-user-input
  pattern: $COL.find($QUERY)
  message: "MongoDB find with user input \u2014 NoSQL injection if $QUERY is from\
    \ req.body"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-943
- id: js-mongoose-find-raw
  pattern: $MODEL.find($QUERY)
  message: "Mongoose find \u2014 verify $QUERY is sanitized (NoSQL injection)"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-943
- id: js-jwt-none-alg
  pattern: 'jwt.verify(..., { algorithms: ["none"] })'
  message: "JWT alg:none \u2014 bypasses verification"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-345
- id: js-jwt-sync-verify-false
  pattern: 'jwt.verify(..., { verify: false })'
  message: JWT verification disabled
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-345
- id: js-crypto-md5
  pattern: crypto.createHash("md5")
  message: "MD5 \u2014 cryptographically broken"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-327
- id: js-crypto-sha1
  pattern: crypto.createHash("sha1")
  message: "SHA1 \u2014 cryptographically broken"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-327
- id: js-bcrypt-low-rounds
  pattern: bcrypt.hash($PWD, 4)
  message: "bcrypt with low rounds \u2014 use at least 12"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-916
- id: js-await-in-loop
  pattern: "for (...) {\n  ...\n  await ...\n}\n"
  message: "await inside loop \u2014 sequential, use Promise.all for parallel"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-1058
- id: js-promise-no-catch
  pattern: $PROMISE.then(...)
  message: "Promise.then without .catch \u2014 unhandled rejection"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-754
- id: js-object-assign-merge
  pattern: Object.assign($TARGET, $SOURCE)
  message: "Object.assign \u2014 verify $SOURCE doesn't have __proto__ (prototype\
    \ pollution)"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-1321
- id: js-merge-deep-unsafe
  pattern: lodash.merge($TARGET, $SOURCE)
  message: "lodash.merge deep \u2014 prototype pollution risk"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-1321
- id: js-fs-read-user-input
  pattern: fs.readFile($PATH, ...)
  message: "fs.readFile with user input \u2014 path traversal"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-22
- id: js-path-join-user-input
  pattern: path.join(..., $INPUT)
  message: "path.join with user input \u2014 path traversal"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-22
- id: js-axios-user-url
  pattern: axios.get($URL)
  message: "axios.get \u2014 verify $URL is not user-controlled (SSRF)"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-918
- id: js-fetch-user-url
  pattern: fetch($URL)
  message: "fetch \u2014 verify $URL is not user-controlled (SSRF)"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-918
