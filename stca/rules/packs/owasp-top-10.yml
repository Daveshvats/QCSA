# STCA OWASP Top 10 + CWE Top 25 (multi-language) Rules — 124 rules
rules:
  - id: owasp-a01-missing-auth-decorator
    pattern: "@\\w+\\.(?:get|post|put|delete|patch)\\(['\\\"]/(?:api|admin)[^'\\\"]*['\\\"]"
    severity: high
    message: "OWASP A01: route without @login_required / @auth_required"
    metadata: {cwe: "CWE-862"}
  - id: owasp-a01-idor-pattern
    pattern: "\\.filter\\s*\\(\\s*\\w+_id\\s*=\\s*(?:request\\.\\w+|params\\[)"
    severity: high
    message: "OWASP A01: IDOR — filter by user-controlled ID"
    metadata: {cwe: "CWE-639"}
  - id: owasp-a01-missing-permission-check
    pattern: "class\\s+\\w+(?:View|Endpoint|Handler)\\b[^:]*:(?!.*permission)"
    severity: medium
    message: "OWASP A01: class without permission check"
    metadata: {cwe: "CWE-862"}
  - id: owasp-a01-jwt-none-alg
    pattern: "algorithm\\s*[:=]\\s*['\\\"]none['\\\"]"
    severity: critical
    message: "OWASP A01: JWT with alg=none — auth bypass"
    metadata: {cwe: "CWE-345"}
  - id: owasp-a01-jwt-verify-disabled
    pattern: "verify\\s*=\\s*False|verify_signature\\s*=\\s*False"
    severity: critical
    message: "OWASP A01: JWT signature verification disabled"
    metadata: {cwe: "CWE-345"}
  - id: owasp-a01-session-fixation
    pattern: "session_id\\s*=\\s*request\\.\\w+|session\\.session_key\\s*=\\s*\\w+"
    severity: high
    message: "OWASP A01: session ID from user input"
    metadata: {cwe: "CWE-384"}
  - id: owasp-a01-cors-wildcard
    pattern: "Access-Control-Allow-Origin['\\\"]?\\s*[:=]\\s*['\\\"]\\*['\\\"]"
    severity: high
    message: "OWASP A01: CORS Allow-Origin wildcard"
    metadata: {cwe: "CWE-942"}
  - id: owasp-a01-cors-credentials-wildcard
    pattern: "Access-Control-Allow-Credentials['\\\"]?\\s*[:=]\\s*true.*Allow-Origin['\\\"]?\\s*[:=]\\s*['\\\"]\\*"
    severity: critical
    message: "OWASP A01: CORS credentials + wildcard origin"
    metadata: {cwe: "CWE-942"}
  - id: owasp-a01-missing-csrf-exempt
    pattern: "@\\w+\\.csrf_exempt"
    severity: medium
    message: "OWASP A01: CSRF exemption — verify intent"
    metadata: {cwe: "CWE-352"}
  - id: owasp-a01-path-traversal
    pattern: "\\bopen\\s*\\(\\s*[^)]*\\+\\s*(?:request|input|user)"
    severity: high
    message: "OWASP A01: path traversal via user input concat"
    metadata: {cwe: "CWE-22"}
  - id: owasp-a02-md5-password
    pattern: "\\b(?:MD5|md5)\\s*\\(\\s*\\w*pass"
    severity: critical
    message: "OWASP A02: MD5 of password — broken hash"
    metadata: {cwe: "CWE-327"}
  - id: owasp-a02-sha1-password
    pattern: "\\b(?:SHA1|sha1)\\s*\\(\\s*\\w*pass"
    severity: critical
    message: "OWASP A02: SHA1 of password"
    metadata: {cwe: "CWE-327"}
  - id: owasp-a02-hardcoded-creds
    pattern: "\\b(?:password|passwd|pwd|secret|api[_-]?key|token)\\s*[:=]\\s*['\\\"][^'\\\"]{6,}['\\\"]"
    severity: high
    message: "OWASP A02: hardcoded credentials"
    metadata: {cwe: "CWE-798"}
  - id: owasp-a02-weak-random
    pattern: "\\b(?:Math\\.random|random\\.random|rand\\s*\\()\\s*\\("
    severity: high
    message: "OWASP A02: weak random for security"
    metadata: {cwe: "CWE-338"}
  - id: owasp-a02-ecb-mode
    pattern: "\\bAES\\.ECB|CipherMode\\.ECB|MODE_ECB"
    severity: critical
    message: "OWASP A02: AES-ECB deterministic"
    metadata: {cwe: "CWE-327"}
  - id: owasp-a02-des-usage
    pattern: "\\bDES\\.create|DESCipher|new\\s+DES\\b"
    severity: critical
    message: "OWASP A02: DES broken — 56-bit key"
    metadata: {cwe: "CWE-327"}
  - id: owasp-a02-3des-usage
    pattern: "\\bTripleDES|3DES|DES_EDE"
    severity: high
    message: "OWASP A02: 3DES — deprecate"
    metadata: {cwe: "CWE-327"}
  - id: owasp-a02-rc4-usage
    pattern: "\\bRC4\\b|ArcFour"
    severity: critical
    message: "OWASP A02: RC4 broken"
    metadata: {cwe: "CWE-327"}
  - id: owasp-a02-ssl-verify-false
    pattern: "\\bverify\\s*=\\s*False|verify_mode\\s*=\\s*VERIFY_NONE|SSL_VERIFY\\s*=\\s*false"
    severity: critical
    message: "OWASP A02: SSL verification disabled"
    metadata: {cwe: "CWE-295"}
  - id: owasp-a02-http-creds-in-url
    pattern: "https?://[^:\\s]+:[^@\\s]+@[^\\s]+"
    severity: high
    message: "OWASP A02: credentials in URL"
    metadata: {cwe: "CWE-522"}
  - id: owasp-a03-sql-fstring
    pattern: "\\.execute\\s*\\(\\s*f['\\\"]"
    severity: critical
    message: "OWASP A03: SQL with f-string"
    metadata: {cwe: "CWE-89"}
  - id: owasp-a03-sql-format
    pattern: "\\.execute\\s*\\(\\s*['\\\"].*\\.format\\s*\\("
    severity: critical
    message: "OWASP A03: SQL with .format()"
    metadata: {cwe: "CWE-89"}
  - id: owasp-a03-sql-concat
    pattern: "\\.execute\\s*\\(\\s*['\\\"][^'\\\"]*['\\\"]\\s*\\+"
    severity: critical
    message: "OWASP A03: SQL with string concat"
    metadata: {cwe: "CWE-89"}
  - id: owasp-a03-sql-percent
    pattern: "\\.execute\\s*\\(\\s*['\\\"].*%s.*['\\\"]\\s*%\\s*\\w"
    severity: high
    message: "OWASP A03: SQL with %-format — verify parameterization"
    metadata: {cwe: "CWE-89"}
  - id: owasp-a03-os-command
    pattern: "\\b(?:os\\.system|subprocess\\.call|subprocess\\.Popen)\\s*\\([^)]*shell\\s*=\\s*True"
    severity: critical
    message: "OWASP A03: shell=True with subprocess"
    metadata: {cwe: "CWE-78"}
  - id: owasp-a03-os-command-user
    pattern: "\\b(?:os\\.system|exec|eval)\\s*\\([^)]*(?:request|input|user|args)"
    severity: critical
    message: "OWASP A03: command with user input"
    metadata: {cwe: "CWE-78"}
  - id: owasp-a03-ldap-injection
    pattern: "\\bsearch_s\\s*\\([^)]*\\+\\s*\\w|ldap\\.search\\s*\\([^)]*\\+"
    severity: high
    message: "OWASP A03: LDAP query with concat"
    metadata: {cwe: "CWE-90"}
  - id: owasp-a03-nosql-injection
    pattern: "\\$where\\s*[:=]\\s*['\\\"]function|MongoClient.*find\\s*\\(\\s*\\{[^}]*\\$"
    severity: high
    message: "OWASP A03: NoSQL $where with user input"
    metadata: {cwe: "CWE-943"}
  - id: owasp-a03-template-injection
    pattern: "\\b(?:render_template_string|Template)\\s*\\([^)]*\\+"
    severity: critical
    message: "OWASP A03: SSTI via string concat"
    metadata: {cwe: "CWE-1336"}
  - id: owasp-a03-xss-echo
    pattern: "\\becho\\s+\\$_(?:GET|POST|REQUEST|COOKIE)"
    severity: high
    message: "OWASP A03: XSS — echo of superglobal"
    metadata: {cwe: "CWE-79"}
  - id: owasp-a03-xss-innerhtml
    pattern: "\\.innerHTML\\s*=\\s*\\w+"
    severity: high
    message: "OWASP A03: XSS — innerHTML assignment"
    metadata: {cwe: "CWE-79"}
  - id: owasp-a03-xss-document-write
    pattern: "\\bdocument\\.write\\s*\\("
    severity: high
    message: "OWASP A03: XSS — document.write"
    metadata: {cwe: "CWE-79"}
  - id: owasp-a03-xss-html-safe
    pattern: "\\.html_safe\\s*\\("
    severity: high
    message: "OWASP A03: XSS — html_safe bypass"
    metadata: {cwe: "CWE-79"}
  - id: owasp-a03-xss-v-html
    pattern: "\\bv-html\\s*="
    severity: high
    message: "OWASP A03: XSS — Vue v-html"
    metadata: {cwe: "CWE-79"}
  - id: owasp-a03-xss-dangerously-set
    pattern: "\\bdangerouslySetInnerHTML\\s*="
    severity: high
    message: "OWASP A03: XSS — React dangerouslySetInnerHTML"
    metadata: {cwe: "CWE-79"}
  - id: owasp-a04-missing-rate-limit
    pattern: "@\\w+\\.(?:post|put|delete)\\(['\\\"](?:login|register|reset|forgot)"
    severity: medium
    message: "OWASP A04: auth route — verify rate limiting"
    metadata: {cwe: "CWE-770"}
  - id: owasp-a04-no-input-validation
    pattern: "def\\s+\\w+\\s*\\([^)]*request[^)]*\\)(?!.*validate|.*clean|.*sanitize)"
    severity: medium
    message: "OWASP A04: function takes request without validation"
    metadata: {cwe: "CWE-20"}
  - id: owasp-a04-trust-boundary
    pattern: "\\buser_role\\s*=\\s*request\\.|is_admin\\s*=\\s*request\\."
    severity: high
    message: "OWASP A04: trust boundary — role from user input"
    metadata: {cwe: "CWE-269"}
  - id: owasp-a04-debug-true-prod
    pattern: "\\bDEBUG\\s*=\\s*True|debug\\s*=\\s*True"
    severity: high
    message: "OWASP A04: DEBUG=True in production"
    metadata: {cwe: "CWE-489"}
  - id: owasp-a05-default-creds
    pattern: "\\b(?:admin|root|sa)\\s*[:=]\\s*['\\\"](?:admin|root|password|sa)['\\\"]"
    severity: critical
    message: "OWASP A05: default credentials"
    metadata: {cwe: "CWE-798"}
  - id: owasp-a05-stack-trace-leak
    pattern: "\\btraceback\\.format_exc\\s*\\(\\s*\\)|\\.printStackTrace\\s*\\(\\s*\\)"
    severity: medium
    message: "OWASP A05: stack trace to user — info leak"
    metadata: {cwe: "CWE-209"}
  - id: owasp-a05-directory-listing
    pattern: "\\bdirectory_listing\\s*=\\s*True|autoindex\\s+on"
    severity: medium
    message: "OWASP A05: directory listing enabled"
    metadata: {cwe: "CWE-548"}
  - id: owasp-a05-x-powered-by
    pattern: "\\bX-Powered-By\\s*[:=]\\s*['\\\"]"
    severity: low
    message: "OWASP A05: X-Powered-By header leaks tech stack"
    metadata: {cwe: "CWE-200"}
  - id: owasp-a05-server-header
    pattern: "\\bServer\\s*:\\s*Apache|server_tokens\\s+on"
    severity: low
    message: "OWASP A05: Server header leaks version"
    metadata: {cwe: "CWE-200"}
  - id: owasp-a05-cors-allow-all
    pattern: "\\bAccess-Control-Allow-Origin\\s*[:=]\\s*['\\\"]\\*['\\\"]"
    severity: high
    message: "OWASP A05: CORS Allow-Origin *"
    metadata: {cwe: "CWE-942"}
  - id: owasp-a06-pinned-old-version
    pattern: "\\b==\\s*0\\.|<\\s*1\\."
    severity: low
    message: "OWASP A06: pinned to old version — verify for CVEs"
    metadata: {cwe: "CWE-1104"}
  - id: owasp-a06-no-version-pin
    pattern: "\\b(?:pip install|npm install|yarn add)\\s+\\w+\\s*$"
    severity: medium
    message: "OWASP A06: dependency without version pin"
    metadata: {cwe: "CWE-1104"}
  - id: owasp-a06-requirements-no-hash
    pattern: "^\\s*\\w+==\\w+\\.\\w+\\.\\w+\\s*$"
    severity: low
    message: "OWASP A06: requirements.txt without hash"
    metadata: {cwe: "CWE-1104"}
  - id: owasp-a07-weak-password
    pattern: "\\bpassword\\s*==\\s*['\\\"](?:password|123456|admin|qwerty|letmein)"
    severity: critical
    message: "OWASP A07: weak password comparison"
    metadata: {cwe: "CWE-521"}
  - id: owasp-a07-mfa-bypass
    pattern: "\\bskip_mfa\\s*=\\s*True|mfa_required\\s*=\\s*False"
    severity: high
    message: "OWASP A07: MFA bypass"
    metadata: {cwe: "CWE-308"}
  - id: owasp-a07-session-timeout-long
    pattern: "session\\.expire\\s*=\\s*\\d{6,}|SESSION_COOKIE_AGE\\s*=\\s*\\d{6,}"
    severity: medium
    message: "OWASP A07: session timeout too long"
    metadata: {cwe: "CWE-613"}
  - id: owasp-a07-no-password-policy
    pattern: "def\\s+validate_password\\s*\\([^)]*\\)\\s*:\\s*(?:pass|return True)"
    severity: high
    message: "OWASP A07: empty password validator"
    metadata: {cwe: "CWE-521"}
  - id: owasp-a07-credential-recovery
    pattern: "def\\s+reset_password\\s*\\([^)]*token[^)]*\\)(?!.*token.*valid|.*expir)"
    severity: high
    message: "OWASP A07: password reset without token validation"
    metadata: {cwe: "CWE-640"}
  - id: owasp-a08-untrusted-deserialization
    pattern: "\\b(?:pickle\\.loads?|yaml\\.load\\b|marshal\\.loads?|cPickle\\.loads?)\\s*\\("
    severity: critical
    message: "OWASP A08: untrusted deserialization"
    metadata: {cwe: "CWE-502"}
  - id: owasp-a08-unserialize
    pattern: "\\bunserialize\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "OWASP A08: PHP unserialize user input"
    metadata: {cwe: "CWE-502"}
  - id: owasp-a08-read-object
    pattern: "\\bObjectInputStream.*readObject\\s*\\("
    severity: critical
    message: "OWASP A08: Java readObject"
    metadata: {cwe: "CWE-502"}
  - id: owasp-a08-marshal-load
    pattern: "\\bMarshal\\.load\\s*\\("
    severity: critical
    message: "OWASP A08: Ruby Marshal.load"
    metadata: {cwe: "CWE-502"}
  - id: owasp-a08-cdn-sri-missing
    pattern: "<script\\s+src=['\\\"]https?://"
    severity: medium
    message: "OWASP A08: CDN script without SRI (subresource integrity)"
    metadata: {cwe: "CWE-829"}
  - id: owasp-a09-print-credentials
    pattern: "\\b(?:print|console\\.log|echo|System\\.out\\.println)\\s*\\([^)]*(?:password|secret|token|api[_-]?key|credit_card|ssn)"
    severity: critical
    message: "OWASP A09: logging credentials"
    metadata: {cwe: "CWE-532"}
  - id: owasp-a09-error-message-leak
    pattern: "return\\s+str\\s*\\(\\s*e\\s*\\)|raise\\s+HTTPException\\s*\\(\\s*[^,]*,\\s*str\\s*\\(\\s*e\\s*\\)"
    severity: medium
    message: "OWASP A09: error message leaks internals"
    metadata: {cwe: "CWE-209"}
  - id: owasp-a09-no-audit-log
    pattern: "def\\s+(?:delete|update|create)_\\w+\\s*\\([^)]*\\)(?!.*log|.*audit)"
    severity: low
    message: "OWASP A09: mutation without audit log"
    metadata: {cwe: "CWE-778"}
  - id: owasp-a10-requests-user-url
    pattern: "\\brequests\\.(?:get|post|put|delete)\\s*\\(\\s*(?:request|input|user|params)"
    severity: critical
    message: "OWASP A10: SSRF — requests with user URL"
    metadata: {cwe: "CWE-918"}
  - id: owasp-a10-curl-user-url
    pattern: "\\bcurl_setopt\\s*\\([^,]+,\\s*CURLOPT_URL\\s*,\\s*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "OWASP A10: SSRF — cURL with superglobal URL"
    metadata: {cwe: "CWE-918"}
  - id: owasp-a10-file-get-contents-user
    pattern: "\\bfile_get_contents\\s*\\(\\s*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "OWASP A10: SSRF — file_get_contents with superglobal"
    metadata: {cwe: "CWE-918"}
  - id: owasp-a10-http-request-user
    pattern: "\\bHTTP\\.(?:get|post)\\s*\\(\\s*(?:request|input|user)"
    severity: critical
    message: "OWASP A10: SSRF — http with user URL"
    metadata: {cwe: "CWE-918"}
  - id: owasp-a10-metadata-service
    pattern: "http://169\\.254\\.169\\.254/latest/meta-data/"
    severity: high
    message: "OWASP A10: AWS metadata service access — verify not SSRF"
    metadata: {cwe: "CWE-918"}
  - id: cwe-22-path-traversal
    pattern: "\\bopen\\s*\\(\\s*['\\\"][^'\\\"]*['\\\"]\\s*%\\s*\\w|fopen\\s*\\(\\s*['\\\"][^'\\\"]*['\\\"]\\s*\\.\\s*\\w"
    severity: high
    message: "CWE-22: path traversal"
    metadata: {cwe: "CWE-22"}
  - id: cwe-78-os-command-injection
    pattern: "\\b(?:system|exec|popen|shell_exec|passthru)\\s*\\(\\s*[^)]*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "CWE-78: OS command injection"
    metadata: {cwe: "CWE-78"}
  - id: cwe-89-sql-injection
    pattern: "\\b(?:mysql_query|mysqli_query|pg_query)\\s*\\(\\s*[^,]*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "CWE-89: SQL injection"
    metadata: {cwe: "CWE-89"}
  - id: cwe-94-code-injection
    pattern: "\\b(?:eval|assert|create_function)\\s*\\(\\s*[^)]*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "CWE-94: code injection"
    metadata: {cwe: "CWE-94"}
  - id: cwe-95-eval-injection
    pattern: "\\beval\\s*\\(\\s*[^)]*(?:request|input|user|args)"
    severity: critical
    message: "CWE-95: eval injection"
    metadata: {cwe: "CWE-95"}
  - id: cwe-98-lfi
    pattern: "\\b(?:include|require)(?:_once)?\\s*\\(\\s*[^)]*\\$_(?:GET|POST|REQUEST)"
    severity: critical
    message: "CWE-98: LFI"
    metadata: {cwe: "CWE-98"}
  - id: cwe-113-header-injection
    pattern: "\\bheader\\s*\\(\\s*['\\\"]Location:[^)]*\\$_(?:GET|POST|REQUEST)"
    severity: high
    message: "CWE-113: header injection"
    metadata: {cwe: "CWE-113"}
  - id: cwe-200-info-disclosure
    pattern: "\\breturn\\s+str\\s*\\(\\s*(?:error|exception|e|exc)\\s*\\)"
    severity: medium
    message: "CWE-200: error details to user"
    metadata: {cwe: "CWE-200"}
  - id: cwe-209-stack-trace
    pattern: "\\b(?:traceback|stack_trace|printStackTrace)\\s*\\("
    severity: medium
    message: "CWE-209: stack trace leak"
    metadata: {cwe: "CWE-209"}
  - id: cwe-269-privilege-escalation
    pattern: "\\bsetuid\\s*\\(\\s*0|seteuid\\s*\\(\\s*0|Runtime\\.getRuntime\\(\\)\\.exec\\s*\\(\\s*['\\\"]sudo"
    severity: high
    message: "CWE-269: privilege escalation"
    metadata: {cwe: "CWE-269"}
  - id: cwe-287-missing-auth
    pattern: "@\\w+\\.(?:get|post)\\(['\\\"]/(?:admin|api/)[^'\\\"]+['\\\"]"
    severity: high
    message: "CWE-287: missing authentication"
    metadata: {cwe: "CWE-287"}
  - id: cwe-352-csrf
    pattern: "@\\w+\\.csrf_exempt|@csrf_exempt"
    severity: medium
    message: "CWE-352: CSRF exemption"
    metadata: {cwe: "CWE-352"}
  - id: cwe-502-deserialization
    pattern: "\\b(?:pickle\\.loads?|yaml\\.load\\b|Marshal\\.load|ObjectInputStream|readObject|unserialize)\\s*\\("
    severity: critical
    message: "CWE-502: deserialization"
    metadata: {cwe: "CWE-502"}
  - id: cwe-601-open-redirect
    pattern: "\\b(?:redirect|RedirectResponse|res\\.redirect)\\s*\\(\\s*(?:request|input|user|params)"
    severity: high
    message: "CWE-601: open redirect"
    metadata: {cwe: "CWE-601"}
  - id: cwe-611-xxe
    pattern: "\\bXMLParser|ET\\.parse|ET\\.fromstring|DocumentBuilder\\.parse|sax\\.parse"
    severity: high
    message: "CWE-611: XXE — verify entity resolution disabled"
    metadata: {cwe: "CWE-611"}
  - id: cwe-643-xpath-injection
    pattern: "\\b\\.evaluate\\s*\\(\\s*['\\\"][^'\\\"]*\\$_(?:GET|POST|REQUEST)|xpath\\.[^=]*=\\s*['\\\"][^'\\\"]*\\.\\."
    severity: high
    message: "CWE-643: XPath injection"
    metadata: {cwe: "CWE-643"}
  - id: cwe-732-permissive-file
    pattern: "\\bchmod\\s*\\(\\s*[^,]+,\\s*0o?777|os\\.chmod\\s*\\([^,]+,\\s*0o?777"
    severity: high
    message: "CWE-732: world-writable file"
    metadata: {cwe: "CWE-732"}
  - id: cwe-770-dos-regex
    pattern: "\\b(?:re\\.match|re\\.search|re\\.findall)\\s*\\(\\s*[^,]*\\$_(?:GET|POST|REQUEST)"
    severity: medium
    message: "CWE-770: ReDoS via user regex"
    metadata: {cwe: "CWE-1333"}
  - id: cwe-798-hardcoded-creds
    pattern: "\\b(?:password|passwd|pwd|api[_-]?key|secret|token)\\s*[:=]\\s*['\\\"][^'\\\"]{6,}['\\\"]"
    severity: high
    message: "CWE-798: hardcoded credentials"
    metadata: {cwe: "CWE-798"}
  - id: cwe-918-ssrf
    pattern: "\\b(?:requests\\.|urllib\\.|http\\.|fetch\\().*\\(?\\s*(?:request|input|user|params\\[)"
    severity: critical
    message: "CWE-918: SSRF"
    metadata: {cwe: "CWE-918"}
  - id: semgrep-lang-security-assert-user
    pattern: "\\bassert\\s*\\(\\s*[^,]*request\\.\\w+"
    severity: high
    message: "Assert on user input — risk of injection"
    metadata: {cwe: "CWE-617"}
  - id: semgrep-lang-security-format-user
    pattern: "\\b\\.format\\s*\\(\\s*[^)]*request\\.\\w+"
    severity: medium
    message: "format with user input — format string attack"
    metadata: {cwe: "CWE-134"}
  - id: semgrep-lang-security-mako-template
    pattern: "<%.*\\$\\{.*request\\."
    severity: high
    message: "Mako template with user interpolation — SSTI"
    metadata: {cwe: "CWE-1336"}
  - id: semgrep-lang-security-tornado-template
    pattern: "\\{\\{\\s*.*request\\.\\w+\\s*\\}\\}"
    severity: high
    message: "Tornado template with user input — XSS"
    metadata: {cwe: "CWE-79"}
  - id: semgrep-lang-security-flask-secret
    pattern: "app\\.secret_key\\s*=\\s*['\\\"][^'\\\"]{8,}['\\\"]"
    severity: high
    message: "Flask hardcoded secret_key"
    metadata: {cwe: "CWE-798"}
  - id: semgrep-lang-security-django-secret
    pattern: "SECRET_KEY\\s*=\\s*['\\\"][^'\\\"]{30,}['\\\"]"
    severity: high
    message: "Django hardcoded SECRET_KEY"
    metadata: {cwe: "CWE-798"}
