# React/JavaScript-specific security rules — addresses findings from Uno Care audit
# These rules catch the exact bug classes that the manual audit found:
# - localStorage JWT storage (CRIT-4)
# - Missing auth guards in route layouts (HIGH-8)
# - JSX template string XSS (CRIT-9)
# - dangerouslySetInnerHTML (MED-1)
# - AES-ECB mode (HIGH-4)
# - Hardcoded encryption keys (CRIT-1)
# - window.open without noopener (HIGH-15)
# - Test URLs in production code (CRIT-2)
# - Hardcoded UUIDs/identifiers (CRIT-5)
# - Missing CSP headers (CRIT-6)
# - console.log of sensitive data (MED-4)
# - JSON.parse at module level (HIGH-10)

rules:
  # === CRIT-4: JWT in localStorage ===
  - id: react-jwt-in-localstorage
    pattern-regex: "localStorage\\.setItem\\s*\\(\\s*[\"']AUTHHEADER|localStorage\\.setItem\\s*\\(\\s*[\"'].*TOKEN|localStorage\\.setItem\\s*\\(\\s*[\"'].*JWT"
    message: "JWT/token stored in localStorage (CWE-922) — XSS can steal it. Use httpOnly cookies or in-memory storage."
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-922", owasp: "A07" }

  - id: react-jwt-from-localstorage
    pattern-regex: "localStorage\\.getItem\\s*\\(\\s*[\"']AUTHHEADER|localStorage\\.getItem\\s*\\(\\s*[\"'].*TOKEN|localStorage\\.getItem\\s*\\(\\s*[\"'].*JWT"
    message: "JWT/token read from localStorage (CWE-922) — token is accessible to XSS. Use httpOnly cookies."
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-922" }

  # === CRIT-9: JSX template string XSS ===
  - id: react-template-string-xss
    pattern-regex: "const\\s+\\w+\\s*=\\s*`[^`]*\\$\\{.*?\\}[^`]*`.*?\\.from\\s*\\("
    message: "Template string with ${} interpolation passed to HTML/PDF renderer — XSS risk (CWE-79)"
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-79", owasp: "A03" }

  - id: react-html-template-interpolation
    pattern-regex: "<td>\\$\\{|<div>\\$\\{|<span>\\$\\{|<p>\\$\\{"
    message: "Unescaped ${} interpolation in HTML template — XSS risk (CWE-79). Use escape-html or DOMPurify."
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-79" }

  # === MED-1: dangerouslySetInnerHTML ===
  - id: react-dangerously-set-inner-html
    pattern: "$EL.dangerouslySetInnerHTML = { __html: $X }"
    message: "dangerouslySetInnerHTML — XSS risk if $X contains user data (CWE-79)"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-79" }

  # === HIGH-4: AES-ECB mode ===
  - id: crypto-aes-ecb
    pattern-regex: "CryptoJS\\.mode\\.ECB|mode:\\s*[\"']ecb[\"']|AES.*ECB"
    message: "AES-ECB mode — cryptographically broken (CWE-327). Identical blocks produce identical ciphertext."
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-327" }

  # === CRIT-1: Hardcoded encryption keys ===
  - id: crypto-hardcoded-key
    pattern-regex: "(?:key|secret|password|token)\\s*=\\s*[\"'][A-Za-z0-9+/=]{16,}[\"']"
    message: "Hardcoded encryption key/secret in source code (CWE-321) — extract to environment variable"
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-321", owasp: "A02" }

  # === HIGH-15: window.open without noopener ===
  - id: js-window-open-no-noopener
    pattern-regex: "window\\.open\\s*\\([^)]*[\"']_blank[\"'][^)]*\\)"
    message: "window.open(_blank) without noopener — tabnabbing + open redirect risk (CWE-1022)"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-1022" }

  # === CRIT-2: Test URLs in production code ===
  - id: test-url-in-production
    pattern-regex: "https?://(?:api)?test\\.|https?://localhost|https?://127\\.0\\.0\\.1|https?://.*\\.test\\."
    message: "Test/localhost URL hardcoded in source — may route production traffic to test environment"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-489" }

  # === CRIT-5: Hardcoded UUIDs ===
  - id: hardcoded-uuid
    pattern-regex: "['\"][0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}['\"]"
    message: "Hardcoded UUID — may leak customer identifiers or create coupling (CWE-200)"
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-200" }

  # === MED-4: console.log of sensitive data ===
  - id: console-log-sensitive
    pattern-regex: "console\\.log\\s*\\(.*(?:token|password|secret|JWT|auth|payload|credential)"
    message: "console.log of sensitive data (CWE-532) — remove or use debug logger"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-532" }

  # === HIGH-10: JSON.parse at module level ===
  - id: js-json-parse-module-level
    pattern-regex: "^(?:const|let|var)\\s+\\w+\\s*=\\s*JSON\\.parse\\s*\\(.*localStorage"
    message: "JSON.parse(localStorage) at module level — crashes entire bundle if stored value is malformed"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-754" }

  # === HIGH-6: Server error messages echoed ===
  - id: js-error-message-echo
    pattern-regex: "enqueueSnackbar\\s*\\(\\s*`?\\$\\{.*error.*response.*data.*message"
    message: "Server error message echoed to user (CWE-209) — may leak internal details. Use safe fallback."
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-209" }

  # === MED-1: document.write ===
  - id: js-document-write
    pattern: document.write(...)
    message: "document.write — XSS risk (CWE-79). Use DOM APIs instead."
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-79" }

  # === HIGH-12: Missing OTP rate limiting ===
  - id: no-otp-rate-limit
    pattern-regex: "sendOTP|sendOffsiteOTP|resendOTP"
    message: "OTP sending function — verify rate limiting and cooldown timer exist (CWE-307)"
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-307" }

  # === HIGH-7: Logout without server call ===
  - id: logout-without-server-call
    pattern-regex: "logoutUser.*localStorage\\.removeItem|logout.*localStorage\\.remove"
    message: "Logout only clears localStorage — server token not invalidated (CWE-613). Add POST /logout server call."
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-613" }

  # === CORS wildcard ===
  - id: cors-wildcard-header
    pattern-regex: "Access-Control-Allow-Origin.*\\*"
    message: "CORS wildcard — allows any origin (CWE-942)"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-942" }

  # === CSP header in request (ineffective) ===
  - id: csp-in-request-header
    pattern-regex: "headers.*Content-Security-Policy"
    message: "CSP header set on REQUEST — browsers ignore it. CSP must be on the RESPONSE (server-side)."
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-693" }

  # === POC files in production ===
  - id: poc-file-in-production
    pattern-regex: "/poc/|/proof-of-concept/|hospitalLogo|signatureBase64"
    message: "POC/proof-of-concept file detected in source tree — should not ship in production bundle"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-489" }

  # === Missing auth guard in React Router layout ===
  - id: react-missing-auth-guard
    pattern-regex: "const\\s+\\w*(?:Auth|Protected|Secure)\\w*\\s*=\\s*(?:\\([^)]*\\)\\s*=>|function)\\s*\\{[^}]*(?:return|<Outlet)"
    message: "Auth layout component may be missing authentication check — verify token validation before rendering children"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-862" }

  # === Default-allow in switch statement (privilege escalation) ===
  - id: react-default-allow-switch
    pattern-regex: "default\\s*:\\s*(?:permissions|access|role|visibility)\\s*=\\s*\\{[^}]*true"
    message: "Default case in permission switch grants access — should default to DENY (CWE-285)"
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-285", owasp: "A01" }

  # === Fetch without auth header ===
  - id: fetch-without-auth
    pattern-regex: "fetch\\s*\\([^)]*\\)(?![^;]*(?:Authorization|auth|token|Bearer))"
    message: "fetch() call without Authorization header — endpoint may be accessible without auth (CWE-862)"
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-862" }

  # === localStorage used for role/permission check ===
  - id: react-role-from-localstorage
    pattern-regex: "localStorage\\.getItem\\s*\\(\\s*[\"'].*ROLE|localStorage\\.getItem\\s*\\(\\s*[\"'].*PERMISSION"
    message: "Role/permission read from localStorage — user-editable, not trustworthy (CWE-269). Read from JWT claims instead."
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-269" }

  # === User-editable corpId/tenantId from localStorage ===
  - id: react-corphid-from-localstorage
    pattern-regex: "localStorage\\.getItem\\s*\\(\\s*[\"'].*CORP|localStorage\\.getItem\\s*\\(\\s*[\"'].*TENANT|localStorage\\.getItem\\s*\\(\\s*[\"'].*ORG_ID"
    message: "CorpId/tenantId read from localStorage — user can substitute any org ID (CWE-639). Verify server-side."
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-639" }

  # === Template literal with ${} in HTML context ===
  - id: react-template-literal-html
    pattern-regex: "`[^`]*<(?:td|div|span|p|h1|h2|h3|th|li|a|img)\\b[^`]*\\$\\{"
    message: "Template literal with HTML tags and ${} interpolation — XSS risk (CWE-79). Escape interpolated values."
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-79" }

  # === CryptoJS usage (client-side crypto) ===
  - id: react-cryptojs-usage
    pattern-regex: "CryptoJS\\."
    message: "CryptoJS usage — client-side crypto is insecure. Keys are in the bundle. Use WebCrypto API."
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-327" }

  # === axios without withCredentials ===
  - id: react-axios-no-credentials
    pattern-regex: "axios\\.(get|post|put|delete|patch)\\s*\\([^)]*\\)(?![^;]*withCredentials)"
    message: "axios call without withCredentials — cookies won't be sent. May break auth."
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-862" }

  # === setInterval without cleanup ===
  - id: react-setinterval-no-cleanup
    pattern-regex: "setInterval\\s*\\([^)]*\\)(?![^;]*clearInterval)"
    message: "setInterval without clearInterval in cleanup — memory leak / unnecessary polling"
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-404" }

  # === Hardcoded API base URL ===
  - id: react-hardcoded-api-url
    pattern-regex: "(?:BASE_URL|API_URL)\\s*=\\s*[\"']https?://(?:api)?test\\.|(?:BASE_URL|API_URL)\\s*=\\s*[\"']https?://localhost"
    message: "Hardcoded test/localhost API URL — production traffic may go to test environment (CWE-489)"
    languages: [javascript, typescript]
    severity: ERROR
    metadata: { cwe: "CWE-489" }

  # === Missing input validation on form submit ===
  - id: react-no-input-validation
    pattern-regex: "onChange\\s*=\\s*\\{[^}]*set\\w+\\s*\\(\\s*e\\.target\\.value\\s*\\)"
    message: "Form input stored without validation — sanitize/validate before storing (CWE-20)"
    languages: [javascript, typescript]
    severity: INFO
    metadata: { cwe: "CWE-20" }

  # === Error response displayed to user ===
  - id: react-error-response-displayed
    pattern-regex: "(?:enqueueSnackbar|toast|alert|setError)\\s*\\(\\s*`?\\$\\{.*?error.*?response.*?data.*?message"
    message: "Raw error response displayed to user — may leak internal details (CWE-209)"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-209" }

  # === JSON.parse without try/catch ===
  - id: react-json-parse-no-try
    pattern-regex: "^(?!.*try\\s*\\{).*JSON\\.parse\\s*\\("
    message: "JSON.parse without try/catch — will crash if value is malformed (CWE-754)"
    languages: [javascript, typescript]
    severity: WARNING
    metadata: { cwe: "CWE-754" }
