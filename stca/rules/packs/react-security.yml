rules:
- id: react-jwt-in-localstorage
  pattern-regex: localStorage\.setItem\s*\(\s*["']AUTHHEADER|localStorage\.setItem\s*\(\s*["'].*TOKEN|localStorage\.setItem\s*\(\s*["'].*JWT
  message: "JWT/token stored in localStorage (CWE-922) \u2014 XSS can steal it. Use\
    \ httpOnly cookies or in-memory storage."
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-922
    owasp: A07
- id: react-jwt-from-localstorage
  pattern-regex: localStorage\.getItem\s*\(\s*["']AUTHHEADER|localStorage\.getItem\s*\(\s*["'].*TOKEN|localStorage\.getItem\s*\(\s*["'].*JWT
  message: "JWT/token read from localStorage (CWE-922) \u2014 token is accessible\
    \ to XSS. Use httpOnly cookies."
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-922
- id: react-template-string-xss
  pattern-regex: const\s+\w+\s*=\s*`[^`]*\$\{.*?\}[^`]*`.*?\.from\s*\(
  message: "Template string with ${} interpolation passed to HTML/PDF renderer \u2014\
    \ XSS risk (CWE-79)"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-79
    owasp: A03
- id: react-html-template-interpolation
  pattern-regex: <td>\$\{|<div>\$\{|<span>\$\{|<p>\$\{
  message: "Unescaped ${} interpolation in HTML template \u2014 XSS risk (CWE-79).\
    \ Use escape-html or DOMPurify."
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-79
- id: react-dangerously-set-inner-html
  pattern: '$EL.dangerouslySetInnerHTML = { __html: $X }'
  message: "dangerouslySetInnerHTML \u2014 XSS risk if $X contains user data (CWE-79)"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-79
- id: crypto-aes-ecb
  pattern-regex: CryptoJS\.mode\.ECB|mode:\s*["']ecb["']|AES.*ECB
  message: "AES-ECB mode \u2014 cryptographically broken (CWE-327). Identical blocks\
    \ produce identical ciphertext."
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-327
- id: crypto-hardcoded-key
  pattern-regex: (?:key|secret|password|token)\s*=\s*["'][A-Za-z0-9+/=]{16,}["']
  message: "Hardcoded encryption key/secret in source code (CWE-321) \u2014 extract\
    \ to environment variable"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-321
    owasp: A02
- id: js-window-open-no-noopener
  pattern-regex: window\.open\s*\([^)]*["']_blank["'][^)]*\)
  message: "window.open(_blank) without noopener \u2014 tabnabbing + open redirect\
    \ risk (CWE-1022)"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-1022
- id: test-url-in-production
  pattern-regex: https?://(?:api)?test\.|https?://localhost|https?://127\.0\.0\.1|https?://.*\.test\.
  message: "Test/localhost URL hardcoded in source \u2014 may route production traffic\
    \ to test environment"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-489
- id: hardcoded-uuid
  pattern-regex: '[''"][0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}[''"]'
  message: "Hardcoded UUID \u2014 may leak customer identifiers or create coupling\
    \ (CWE-200)"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-200
- id: console-log-sensitive
  pattern-regex: console\.log\s*\(.*(?:token|password|secret|JWT|auth|payload|credential)
  message: "console.log of sensitive data (CWE-532) \u2014 remove or use debug logger"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-532
- id: js-json-parse-module-level
  pattern-regex: ^(?:const|let|var)\s+\w+\s*=\s*JSON\.parse\s*\(.*localStorage
  message: "JSON.parse(localStorage) at module level \u2014 crashes entire bundle\
    \ if stored value is malformed"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-754
- id: js-error-message-echo
  pattern-regex: enqueueSnackbar\s*\(\s*`?\$\{.*error.*response.*data.*message
  message: "Server error message echoed to user (CWE-209) \u2014 may leak internal\
    \ details. Use safe fallback."
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-209
- id: react-js-document-write
  pattern: document.write(...)
  message: "document.write \u2014 XSS risk (CWE-79). Use DOM APIs instead."
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-79
- id: no-otp-rate-limit
  pattern-regex: sendOTP|sendOffsiteOTP|resendOTP
  message: "OTP sending function \u2014 verify rate limiting and cooldown timer exist\
    \ (CWE-307)"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-307
- id: logout-without-server-call
  pattern-regex: logoutUser.*localStorage\.removeItem|logout.*localStorage\.remove
  message: "Logout only clears localStorage \u2014 server token not invalidated (CWE-613).\
    \ Add POST /logout server call."
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-613
- id: cors-wildcard-header
  pattern-regex: Access-Control-Allow-Origin.*\*
  message: "CORS wildcard \u2014 allows any origin (CWE-942)"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-942
- id: csp-in-request-header
  pattern-regex: headers.*Content-Security-Policy
  message: "CSP header set on REQUEST \u2014 browsers ignore it. CSP must be on the\
    \ RESPONSE (server-side)."
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-693
- id: poc-file-in-production
  pattern-regex: /poc/|/proof-of-concept/|hospitalLogo|signatureBase64
  message: "POC/proof-of-concept file detected in source tree \u2014 should not ship\
    \ in production bundle"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-489
- id: react-missing-auth-guard
  pattern-regex: const\s+\w*(?:Auth|Protected|Secure)\w*\s*=\s*(?:\([^)]*\)\s*=>|function)\s*\{[^}]*(?:return|<Outlet)
  message: "Auth layout component may be missing authentication check \u2014 verify\
    \ token validation before rendering children"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-862
- id: react-default-allow-switch
  pattern-regex: default\s*:\s*(?:permissions|access|role|visibility)\s*=\s*\{[^}]*true
  message: "Default case in permission switch grants access \u2014 should default\
    \ to DENY (CWE-285)"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-285
    owasp: A01
- id: fetch-without-auth
  pattern-regex: fetch\s*\([^)]*\)(?![^;]*(?:Authorization|auth|token|Bearer))
  message: "fetch() call without Authorization header \u2014 endpoint may be accessible\
    \ without auth (CWE-862)"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-862
- id: react-role-from-localstorage
  pattern-regex: localStorage\.getItem\s*\(\s*["'].*ROLE|localStorage\.getItem\s*\(\s*["'].*PERMISSION
  message: "Role/permission read from localStorage \u2014 user-editable, not trustworthy\
    \ (CWE-269). Read from JWT claims instead."
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-269
- id: react-corphid-from-localstorage
  pattern-regex: localStorage\.getItem\s*\(\s*["'].*CORP|localStorage\.getItem\s*\(\s*["'].*TENANT|localStorage\.getItem\s*\(\s*["'].*ORG_ID
  message: "CorpId/tenantId read from localStorage \u2014 user can substitute any\
    \ org ID (CWE-639). Verify server-side."
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-639
- id: react-template-literal-html
  pattern-regex: '`[^`]*<(?:td|div|span|p|h1|h2|h3|th|li|a|img)\b[^`]*\$\{'
  message: "Template literal with HTML tags and ${} interpolation \u2014 XSS risk\
    \ (CWE-79). Escape interpolated values."
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-79
- id: react-cryptojs-usage
  pattern-regex: CryptoJS\.
  message: "CryptoJS usage \u2014 client-side crypto is insecure. Keys are in the\
    \ bundle. Use WebCrypto API."
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-327
- id: react-axios-no-credentials
  pattern-regex: axios\.(get|post|put|delete|patch)\s*\([^)]*\)(?![^;]*withCredentials)
  message: "axios call without withCredentials \u2014 cookies won't be sent. May break\
    \ auth."
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-862
- id: react-setinterval-no-cleanup
  pattern-regex: setInterval\s*\([^)]*\)(?![^;]*clearInterval)
  message: "setInterval without clearInterval in cleanup \u2014 memory leak / unnecessary\
    \ polling"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-404
- id: react-hardcoded-api-url
  pattern-regex: (?:BASE_URL|API_URL)\s*=\s*["']https?://(?:api)?test\.|(?:BASE_URL|API_URL)\s*=\s*["']https?://localhost
  message: "Hardcoded test/localhost API URL \u2014 production traffic may go to test\
    \ environment (CWE-489)"
  languages:
  - javascript
  - typescript
  severity: ERROR
  metadata:
    cwe: CWE-489
- id: react-no-input-validation
  pattern-regex: onChange\s*=\s*\{[^}]*set\w+\s*\(\s*e\.target\.value\s*\)
  message: "Form input stored without validation \u2014 sanitize/validate before storing\
    \ (CWE-20)"
  languages:
  - javascript
  - typescript
  severity: INFO
  metadata:
    cwe: CWE-20
- id: react-error-response-displayed
  pattern-regex: (?:enqueueSnackbar|toast|alert|setError)\s*\(\s*`?\$\{.*?error.*?response.*?data.*?message
  message: "Raw error response displayed to user \u2014 may leak internal details\
    \ (CWE-209)"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-209
- id: react-json-parse-no-try
  pattern-regex: ^(?!.*try\s*\{).*JSON\.parse\s*\(
  message: "JSON.parse without try/catch \u2014 will crash if value is malformed (CWE-754)"
  languages:
  - javascript
  - typescript
  severity: WARNING
  metadata:
    cwe: CWE-754
